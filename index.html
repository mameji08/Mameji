  <!-- ============================================ -->
  <!-- CUSTOM STYLES - CSS Animations และ Themes -->
  <!-- ============================================ -->
  <style>
    /* === GLOBAL RESET === */
    * {
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      margin: 0;
    }

    /* === CSS VARIABLES - ตัวแปรสีหลัก === */
    :root {
      --ink: #0a0a0a;
      --paper: #f0ede6;
      --accent: #e8ff47;
      --accent2: #ff4757;
      --dim: #1a1a1a;
      --muted: #2e2e2e;
      --text-muted: #888;
      --border: #2e2e2e;
      --mono: 'Space Mono', monospace;
      --display: 'Syne', sans-serif;
      --body: 'Sarabun', sans-serif;
    }

    /* === ฟอนต์ Playpen Sans Thai === */
    .font-playpen {
      --mono: 'Playpen Sans Thai', cursive;
      --display: 'Playpen Sans Thai', cursive;
      --body: 'Playpen Sans Thai', cursive;
    }

    /* === ฟอนต์ Kanit + Playpen === */
    .font-kanit {
      --mono: 'Kanit', sans-serif;
      --display: 'Kanit', sans-serif;
      --body: 'Kanit', sans-serif;
    }

    /* === ฟอนต์ Kanit + Prompt + Playpen === */
    .font-kanit-prompt {
      --mono: 'Prompt', sans-serif;
      --display: 'Kanit', sans-serif;
      --body: 'Prompt', sans-serif;
    }

    /* === ฟอนต์ Noto Sans Thai + Kanit + Prompt + Playpen === */
    .font-noto {
      --mono: 'Noto Sans Thai', sans-serif;
      --display: 'Kanit', sans-serif;
      --body: 'Noto Sans Thai', sans-serif;
    }

    /* === ฟอนต์ Itim + Kanit + Noto + Playpen + Prompt === */
    .font-itim {
      --mono: 'Itim', cursive;
      --display: 'Kanit', sans-serif;
      --body: 'Itim', cursive;
    }

    /* === ฟอนต์ Complete Set (Itim + K2D + Kanit + Noto + Playpen + Prompt + Sriracha) === */
    .font-complete {
      --mono: 'K2D', sans-serif;
      --display: 'Sriracha', cursive;
      --body: 'K2D', sans-serif;
    }

    /* === UTILITY CLASSES === */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* === ANIMATIONS KEYFRAMES === */
    @keyframes scan {
      0% {
        transform: translateY(-100%);
      }

      100% {
        transform: translateY(100vh);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    @keyframes slideInUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(232, 255, 71, 0.4);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(232, 255, 71, 0);
      }
    }

    @keyframes ticker {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    /* === ANIMATION CLASSES === */
    .animate-slideInUp {
      animation: slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .animate-fadeIn {
      animation: fadeIn 0.3s ease both;
    }

    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      animation: scan 8s linear infinite;
      opacity: 0.15;
      pointer-events: none;
      z-index: 9999;
    }

    .blink {
      animation: blink 1s step-end infinite;
    }

    .ticker-wrap {
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker-inner {
      display: inline-flex;
      animation: ticker 20s linear infinite;
    }

    .spin-slow {
      animation: spin 8s linear infinite;
    }

    .pulse-accent {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    /* === THEME VARIANTS === */
    .theme-light {
      --ink: #0a0a0a;
      --paper: #0a0a0a;
      --dim: #e8e4dc;
      --muted: #d0ccc3;
      --text-muted: #666;
      --border: #c8c4bc;
      background: #f0ede6 !important;
      color: #0a0a0a;
    }

    .theme-neon {
      --ink: #080816;
      --paper: #0f0f23;
      --accent: #00ffcc;
      --dim: #12122a;
      --muted: #1a1a35;
      --text-muted: #5566aa;
      --border: #1e1e40;
      background: #080816 !important;
    }

    .theme-rust {
      --accent: #ff6b35;
      --accent2: #ffd700;
    }

    /* === CUSTOM INPUT STYLES === */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    .theme-light input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0);
    }

    /* === BACKGROUND PATTERNS === */
    .grid-noise {
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255, 255, 255, 0.03) 39px, rgba(255, 255, 255, 0.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255, 255, 255, 0.03) 39px, rgba(255, 255, 255, 0.03) 40px);
    }

    /* === STATUS STYLES === */
    .status-todo {
      border-left: 3px solid #555;
    }

    .status-doing {
      border-left: 3px solid var(--accent);
    }

    .status-done {
      border-left: 3px solid #444;
      opacity: 0.55;
    }

    /* === CHANNEL STYLES === */
    .ch-LINE {
      background: #1a2e1a;
      color: #7ec87e;
      border-color: #2d4d2d;
    }

    .ch-FB,
    .ch-FACEBOOK {
      background: #1a1d2e;
      color: #6b89c8;
      border-color: #2a2f4d;
    }

    .ch-IG {
      background: #2e1a24;
      color: #c87ea0;
      border-color: #4d2a3a;
    }

    .ch-DISCORD {
      background: #1e1a2e;
      color: #8b7ec8;
      border-color: #382a4d;
    }

    .ch-other {
      background: #1e1e1e;
      color: #888;
      border-color: #333;
    }

    /* === MODAL OVERLAY === */
    .modal-overlay {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
    }

    /* === SCROLLBAR STYLES === */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #111;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
    }
  </style>
</head>

    const LangContext = React.createContext({ lang: 'th', t: TRANSLATIONS.th, setLang: () => { } });
    const useLang = () => React.useContext(LangContext);

    // ============================================
    // FONT MANAGER
    // ============================================
    const setActiveFont = (fontId) => {
      const fontIds = ['default', 'playpen', 'kanit', 'kanit-prompt', 'noto', 'itim', 'complete'];

      fontIds.forEach(id => {
        const el = document.getElementById(`font-${id}`);
        if (el) el.setAttribute('disabled', 'disabled');
      });

      fontIds.forEach(id => {
        if (id !== 'default') {
          document.body.classList.remove(`font-${id}`);
        }
      });

      if (fontId !== 'default') {
        const selectedEl = document.getElementById(`font-${fontId}`);
        if (selectedEl) selectedEl.removeAttribute('disabled');
        document.body.classList.add(`font-${fontId}`);
      } else {
        const defaultEl = document.getElementById('font-default');
        if (defaultEl) defaultEl.removeAttribute('disabled');
      }
    };

    // ============================================
    // MODAL WRAPPER
    // ============================================
    const Modal = ({ onClose, children, wide }) => (
      <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center animate-fadeIn modal-overlay" onClick={onClose}>
        <div
          className={`w-full ${wide ? 'max-w-lg' : 'max-w-sm'} animate-slideInUp`}
          style={{ background: 'var(--dim)', border: '1px solid var(--border)', borderRadius: '20px 20px 0 0', maxHeight: '90vh', overflowY: 'auto' }}
          onClick={e => e.stopPropagation()}
        >
          {children}
        </div>
      </div>
    );

    // ============================================
    // THEME MANAGER
    // ============================================
    const ThemeManager = ({ onClose, uiTheme, onUIThemeChange, currentFont, onFontChange }) => {
      const { t, lang, setLang } = useLang();
      const [tab, setTab] = useState('ui');

      const handleFontChange = (fontId) => {
        onFontChange(fontId);
        setActiveFont(fontId);
      };

      return (
        <Modal onClose={onClose} wide>
          <div style={{ padding: '24px', fontFamily: 'var(--mono)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
              <span style={{ fontSize: '11px', letterSpacing: '0.2em', color: 'var(--accent)', textTransform: 'uppercase' }}>{t.themeTitle}</span>
              <button onClick={onClose} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', padding: '4px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '11px' }}>ESC</button>
            </div>

            <div style={{ display: 'flex', gap: '6px', marginBottom: '20px' }}>
              {['ui', 'font', 'lang'].map(tb => (
                <button key={tb} onClick={() => setTab(tb)} style={{ flex: 1, padding: '8px', border: '1px solid', borderColor: tab === tb ? 'var(--accent)' : 'var(--border)', background: tab === tb ? 'var(--accent)' : 'transparent', color: tab === tb ? 'var(--ink)' : 'var(--text-muted)', fontSize: '9px', letterSpacing: '0.1em', textTransform: 'uppercase', cursor: 'pointer', borderRadius: '4px', fontFamily: 'var(--mono)' }}>
                  {tb === 'ui' ? t.uiSkin : tb === 'font' ? t.fontFamily : t.language}
                </button>
              ))}
            </div>

            {tab === 'ui' && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', maxHeight: '400px', overflowY: 'auto' }}>
                {UI_THEMES.map(th => (
                  <button key={th.id} onClick={() => { onUIThemeChange(th.id); onClose(); }}
                    style={{ padding: '16px', border: '1px solid', borderColor: uiTheme === th.id ? th.accent : 'var(--border)', background: th.id === 'light' ? '#f0ede6' : th.id === 'neon' ? '#080816' : th.id === 'rust' ? '#1a0f0a' : '#111', borderRadius: '8px', cursor: 'pointer', fontFamily: 'var(--mono)', fontSize: '11px', color: th.accent, letterSpacing: '0.1em' }}>
                    {th.name}{uiTheme === th.id && <span style={{ marginLeft: '8px' }}>✓</span>}

              <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '10px', maxHeight: '400px', overflowY: 'auto' }}>

                    <div style={{ fontSize: '24px', marginBottom: '6px' }}>{tr.langFlag}</div>
                    <div style={{ fontSize: '10px', color: lang === code ? 'var(--accent)' : 'var(--text-muted)', fontWeight: 700 }}>{tr.langName}</div>
                    {lang === code && <div style={{ fontSize: '10px', color: 'var(--accent)', marginTop: '4px' }}>✓</div>}

                ))}
              </div>
            )}
          </div>

      );
    };

    // ============================================
    // TASK CARD
    // ============================================
    const TaskCard = ({ task, isAdmin, onEdit, onToggleDoing, onToggleStatus, accent, accent2 }) => {
      const { t } = useLang();
      const chClass = task.channel === 'LINE' ? 'ch-LINE' : task.channel === 'FB' || task.channel === 'FACEBOOK' ? 'ch-FB' : task.channel === 'IG' ? 'ch-IG' : (task.channel === 'DISCORD' || task.channel === 'Discord') ? 'ch-DISCORD' : 'ch-other';
      const statusClass = `status-${task.status}`;

      return (
        <div
          onClick={() => isAdmin && onEdit(task)}
          className={`${statusClass}`}
          style={{
            background: 'var(--dim)',
            border: '1px solid var(--border)',
            borderRadius: '8px',
            padding: '14px 16px',
            cursor: isAdmin ? 'pointer' : 'default',
            transition: 'all 0.15s',
            marginBottom: '8px',
            position: 'relative',
            overflow: 'hidden',
          }}
        >
          {task.status === 'doing' && (
            <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '2px', background: `linear-gradient(to right, transparent, ${accent}, transparent)`, opacity: 0.8 }} />
          )}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '8px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', minWidth: 0 }}>
              <span style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: '14px', color: task.status === 'done' ? 'var(--text-muted)' : 'var(--paper)', textDecoration: task.status === 'done' ? 'line-through' : 'none', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: '140px' }}>
                {task.client}
              </span>
              <span className={chClass} style={{ fontFamily: 'var(--mono)', fontSize: '8px', padding: '2px 8px', borderRadius: '3px', border: '1px solid', letterSpacing: '0.1em', fontWeight: 700, textTransform: 'uppercase', flexShrink: 0 }}>
                {task.channel}
              </span>
              {task.priority === 'urgent' && (
                <span style={{ fontFamily: 'var(--mono)', fontSize: '8px', color: accent2, border: `1px solid ${accent2}`, padding: '1px 6px', borderRadius: '3px', flexShrink: 0 }}>!</span>
              )}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px', flexShrink: 0 }}>
              {isAdmin ? (
                <>
                  <button onClick={e => { e.stopPropagation(); onToggleDoing(e, task.id); }}
                    style={{ width: '26px', height: '26px', borderRadius: '4px', border: '1px solid', borderColor: task.status === 'doing' ? accent : 'var(--border)', background: task.status === 'doing' ? `${accent}22` : 'transparent', color: task.status === 'doing' ? accent : 'var(--text-muted)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', transition: 'all 0.15s' }}>
                    <span className={task.status === 'doing' ? 'spin-slow' : ''} style={{ display: 'flex' }}><Ico.Loader size={12} /></span>
                  </button>
                  <button onClick={e => { e.stopPropagation(); onToggleStatus(e, task.id); }}
                    style={{ width: '26px', height: '26px', borderRadius: '4px', border: '1px solid', borderColor: task.status === 'done' ? '#4caf50' : 'var(--border)', background: task.status === 'done' ? '#4caf5022' : 'transparent', color: task.status === 'done' ? '#4caf50' : 'var(--text-muted)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', transition: 'all 0.15s' }}>
                    <Ico.Check />
                  </button>
                </>
              ) : (
                <span style={{ fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.1em', color: task.status === 'doing' ? accent : task.status === 'done' ? '#4caf50' : 'var(--text-muted)', border: '1px solid', borderColor: task.status === 'doing' ? `${accent}44` : task.status === 'done' ? '#4caf5044' : 'var(--border)', padding: '3px 8px', borderRadius: '3px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                  {task.status === 'doing' && <><span className="spin-slow" style={{ display: 'flex' }}><Ico.Loader size={9} /></span> {t.statusWip}</>}
                  {task.status === 'done' && <><Ico.Check /> {t.statusDone}</>}
                  {task.status === 'todo' && <><Ico.Clock /> {t.statusWait}</>}
                </span>
              )}
            </div>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

              <span style={{ fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>{task.type}</span>

            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '4px', color: 'var(--text-muted)', fontFamily: 'var(--mono)', fontSize: '10px', flexShrink: 0 }}>
              <Ico.Cal />
              {new Date(task.deadline).toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' })}
            </div>
          </div>
        </div>
      );

    // ============================================
    // CALENDAR VIEW
    // ============================================
    const CalendarView = ({ currentMonth, setCurrentMonth, selectedDate, setSelectedDate, today, tasks, accent }) => {
      const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();
      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);
      const MONTHS = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
      const DAYS = ["SU", "MO", "TU", "WE", "TH", "FR", "SA"];

      return (
        <div style={{ background: 'var(--dim)', border: '1px solid var(--border)', borderRadius: '12px', padding: '20px', marginBottom: '16px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
            <button onClick={() => setCurrentMonth(new Date(year, month - 1, 1))} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', width: '28px', height: '28px', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Ico.Chevron dir="left" />
            </button>
            <span style={{ fontFamily: 'var(--mono)', fontSize: '13px', letterSpacing: '0.2em', color: accent }}>{MONTHS[month]} {year}</span>
            <button onClick={() => setCurrentMonth(new Date(year, month + 1, 1))} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', width: '28px', height: '28px', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Ico.Chevron />
            </button>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '4px', marginBottom: '8px' }}>
            {DAYS.map(d => <div key={d} style={{ textAlign: 'center', fontFamily: 'var(--mono)', fontSize: '9px', color: 'var(--text-muted)', letterSpacing: '0.1em' }}>{d}</div>)}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '4px' }}>
            {days.map((day, idx) => {
              if (!day) return <div key={`e-${idx}`} />;
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
              const isSelected = selectedDate === dateStr, isToday = today === dateStr;
              const hasTasks = tasks.some(t => t.deadline === dateStr);
              return (
                <div key={dateStr} onClick={() => setSelectedDate(dateStr)}

    // ============================================
    // SITE SETTINGS MODAL
    // ============================================
    const SiteSettingsModal = ({ onClose, currentFavicon, currentSiteTitle, onSaveFavicon, onSaveSiteTitle, accent }) => {

              <span style={{ fontSize: '11px', letterSpacing: '0.2em', color: accent, textTransform: 'uppercase' }}>{t.settingsTitle}</span>
              <button onClick={onClose} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', padding: '4px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '11px' }}>ESC</button>

    // ============================================
    // AUTH MODAL
    // ============================================
    const AuthModal = ({ onClose, onLogin, accent }) => {

    // TASK FORM MODAL
    // ============================================

              <button type="button" onClick={onClose} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', padding: '4px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '11px' }}>ESC</button>

                <div>
                  <div style={{ fontSize: '8px', color: 'var(--text-muted)', letterSpacing: '0.15em', marginBottom: '2px' }}>{t.taskId}</div>
                  <div style={{ fontSize: '10px', color: 'var(--paper)' }}>{editingTask.id}</div>
                </div>
                <button type="button" onClick={() => copy(editingTask.id)} style={{ background: copied ? `${accent}22` : 'none', border: `1px solid ${copied ? accent : 'var(--border)'}`, color: copied ? accent : 'var(--text-muted)', padding: '4px 10px', borderRadius: '4px', cursor: 'pointer', fontSize: '9px', letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: '4px' }}>
                  <Ico.Copy />{copied ? t.copied : t.copy}

            <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: '12px' }}>

                {t.urgent}
                <input type="checkbox" name="priority" value="urgent" defaultChecked={editingTask?.priority === 'urgent'} style={{ display: 'none' }} id="urgentChk" />
                <div style={{ width: '32px', height: '16px', background: 'var(--muted)', borderRadius: '8px', position: 'relative', border: '1px solid var(--border)', cursor: 'pointer' }}
                  onClick={() => { const el = document.getElementById('urgentChk'); el.checked = !el.checked; }}>
                  <div style={{ position: 'absolute', width: '10px', height: '10px', borderRadius: '50%', background: accent2, top: '2px', transition: 'left 0.2s', left: editingTask?.priority === 'urgent' ? '18px' : '2px' }} />
                </div>
              </label>
            </div>

            {[
              { name: 'client', placeholder: t.clientPlaceholder, required: true, list: null, defaultVal: editingTask?.client },

              { name: 'channel', placeholder: t.channelPlaceholder, required: true, list: 'channelList', defaultVal: editingTask?.channel },
            ].map(f => (

                  style={{ width: '100%', background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--paper)', padding: '12px 14px', borderRadius: '6px', fontFamily: 'var(--mono)', fontSize: '11px', outline: 'none', boxSizing: 'border-box' }}
                  placeholder={f.placeholder} />

            <datalist id="typeList">{taskTypes.map(tp => <option key={tp} value={tp} />)}</datalist>
            <datalist id="channelList">{channels.map(ch => <option key={ch} value={ch} />)}</datalist>

            <textarea name="details" rows="2" defaultValue={editingTask?.details || ''}
              style={{ width: '100%', background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--paper)', padding: '12px 14px', borderRadius: '6px', fontFamily: 'var(--body)', fontSize: '12px', outline: 'none', resize: 'none', marginBottom: '10px', boxSizing: 'border-box' }}
              placeholder={t.detailsPlaceholder} />

            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '20px', background: 'var(--muted)', border: '1px solid var(--border)', borderRadius: '6px', padding: '10px 14px' }}>
              <Ico.Cal /><span style={{ fontSize: '9px', color: 'var(--text-muted)', letterSpacing: '0.15em', flex: 1, textTransform: 'uppercase' }}>{t.deadline}</span>
              <input type="date" name="deadline" required defaultValue={editingTask?.deadline || nextQueueDate}
                style={{ background: 'none', border: 'none', color: accent, fontFamily: 'var(--mono)', fontSize: '11px', outline: 'none', cursor: 'pointer' }} />
            </div>

            {saving ? (
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', padding: '14px', color: 'var(--text-muted)', fontFamily: 'var(--mono)', fontSize: '11px' }}>
                <span className="spin-slow" style={{ display: 'flex' }}><Ico.Loader /></span> {t.saving}
              </div>
            ) : (
              <div style={{ display: 'flex', gap: '8px' }}>
                <button type="submit" style={{ flex: 1, background: accent, color: 'var(--ink)', border: 'none', padding: '14px', borderRadius: '8px', fontFamily: 'var(--mono)', fontSize: '11px', fontWeight: 700, cursor: 'pointer', letterSpacing: '0.15em' }}>
                  {editingTask ? t.update : t.create}
                </button>
                {editingTask && (
                  <button type="button" onClick={() => setDelConfirm(true)}
                    style={{ width: '46px', background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--text-muted)', borderRadius: '8px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Ico.Trash />
                  </button>
                )}
              </div>
            )}

            {delConfirm && (
              <div style={{ marginTop: '12px', background: '#ff475722', border: '1px solid #ff475766', borderRadius: '8px', padding: '12px', textAlign: 'center' }}>
                <div style={{ fontSize: '10px', color: '#ff4757', letterSpacing: '0.1em', marginBottom: '10px' }}>{t.confirmDelete}</div>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <button type="button" onClick={() => setDelConfirm(false)} style={{ flex: 1, background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--text-muted)', padding: '8px', borderRadius: '6px', cursor: 'pointer', fontFamily: 'var(--mono)', fontSize: '10px' }}>{t.cancel}</button>
                  <button type="button" onClick={() => onDelete(editingTask.id)} style={{ flex: 1, background: '#ff4757', color: 'white', border: 'none', padding: '8px', borderRadius: '6px', cursor: 'pointer', fontFamily: 'var(--mono)', fontSize: '10px', fontWeight: 700 }}>{t.delete}</button>
                </div>
              </div>
            )}
          </form>
        </Modal>
      );
    };

    // ============================================
    // IMAGE MODAL
    // ============================================
    const ImageModal = ({ onClose, onSave, titleKey, accent }) => {
      const { t } = useLang();
      const [url, setUrl] = useState('');
      const handle = e => {
        e.preventDefault();
        if (!url) return;
        let final = url;
        const m = final.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || final.match(/id=([a-zA-Z0-9_-]+)/) || final.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (m && m[1]) final = `https://drive.google.com/uc?export=view&id=${m[1]}`;
        onSave(final);
      };
      return (
        <Modal onClose={onClose}>
          <form onSubmit={handle} style={{ padding: '24px', fontFamily: 'var(--mono)' }}>
            <div style={{ fontSize: '11px', letterSpacing: '0.2em', color: accent, marginBottom: '20px', textTransform: 'uppercase' }}>{t[titleKey]}</div>
            <input type="url" required value={url} onChange={e => setUrl(e.target.value)}
              style={{ width: '100%', background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--paper)', padding: '12px 14px', borderRadius: '6px', fontFamily: 'var(--mono)', fontSize: '11px', outline: 'none', marginBottom: '12px', boxSizing: 'border-box' }}
              placeholder="https://..." />
            <button type="submit" style={{ width: '100%', background: accent, color: 'var(--ink)', border: 'none', padding: '13px', borderRadius: '8px', fontFamily: 'var(--mono)', fontSize: '11px', fontWeight: 700, cursor: 'pointer', letterSpacing: '0.15em' }}>{t.uploadBtn}</button>
          </form>
        </Modal>
      );
    };

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [tasks, setTasks] = useState([]);
      const [taskTypes, setTaskTypes] = useState(['Logo', 'Banner', 'Artwork']);
      const [channels, setChannels] = useState(['LINE', 'FB', 'IG']);
      const [isLoading, setIsLoading] = useState(true);
      const [view, setView] = useState('dashboard');
      const [isCalendarView, setIsCalendarView] = useState(false);
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedDate, setSelectedDate] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      });
      const [showModal, setShowModal] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [showAuth, setShowAuth] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [showTheme, setShowTheme] = useState(false);
      const [showProfileImg, setShowProfileImg] = useState(false);
      const [showBannerImg, setShowBannerImg] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);
      const [profileImage, setProfileImage] = useState(null);
      const [bannerImage, setBannerImage] = useState(null);
      const [isBannerVisible, setIsBannerVisible] = useState(true);
      const [siteTitle, setSiteTitle] = useState('NEXO');
      const [favicon, setFavicon] = useState('');
      const [selectedNextDate, setSelectedNextDate] = useState('');
      const [searchQuery, setSearchQuery] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [uiTheme, setUITheme] = useState('dark');
      const [currentFont, setCurrentFont] = useState('default');
      const [lang, setLang] = useState(() => localStorage.getItem('appLang') || 'th');

      const fetchAPI = window.fetchAPI;
      const t = TRANSLATIONS[lang] || TRANSLATIONS.th;

      const accent = UI_THEMES.find(t => t.id === uiTheme)?.accent || '#e8ff47';
      const accent2 = UI_THEMES.find(t => t.id === uiTheme)?.accent2 || '#ff4757';
      const uiClass = UI_THEMES.find(t => t.id === uiTheme)?.class || '';

      const updateFavicon = useCallback(url => {
        ['apple-touch-icon', 'icon-192', 'shortcut-icon'].forEach(id => {
          const el = document.getElementById(id); if (el) el.href = url;
        });
      }, []);

      useEffect(() => {
        const savedTheme = localStorage.getItem('uiTheme');
        if (savedTheme) setUITheme(savedTheme);

        const savedFont = localStorage.getItem('appFont');
        if (savedFont) {
          setCurrentFont(savedFont);
          setActiveFont(savedFont);
        }

        const savedLang = localStorage.getItem('appLang');
        if (savedLang && TRANSLATIONS[savedLang]) setLang(savedLang);
      }, []);

      useEffect(() => {
        fetch(window.APP_CONFIG.WEB_APP_URL + "?action=getInitialData", { redirect: "follow" })
          .then(r => r.json())
          .then(res => {
            if (res.status === 'success') {
              const d = res.data;
              setTasks(d.tasks || []);
              if (d.taskTypes?.length > 0) setTaskTypes(d.taskTypes);
              if (d.channels?.length > 0) setChannels(d.channels);
              if (d.profileImage) setProfileImage(d.profileImage);
              if (d.bannerImage) setBannerImage(d.bannerImage);
              if (d.bannerVisible !== undefined) setIsBannerVisible(d.bannerVisible);
              if (d.lockedNextDate) setSelectedNextDate(d.lockedNextDate);
              if (d.siteTitle) { setSiteTitle(d.siteTitle); document.title = d.siteTitle; }
              if (d.favicon) { setFavicon(d.favicon); updateFavicon(d.favicon); }
            }
            setIsLoading(false);
          })
          .catch(() => setIsLoading(false));
      }, []);

      const today = useMemo(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }, []);

      const todayTasks = useMemo(() => tasks.filter(t => t.deadline === today), [tasks, today]);
      const doneToday = useMemo(() => todayTasks.filter(t => t.status === 'done').length, [todayTasks]);
      const progress = todayTasks.length === 0 ? 0 : Math.round((doneToday / todayTasks.length) * 100);
      const waitingCount = useMemo(() => tasks.filter(t => t.status !== 'done').length, [tasks]);

      const nextQueueDate = useMemo(() => {
        if (selectedNextDate) return selectedNextDate;
        let d = new Date();
        for (let i = 0; i < 365; i++) {
          const s = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
          if (tasks.filter(t => t.deadline === s).length === 0) return s;
          d.setDate(d.getDate() + 1);
        }
        return today;
      }, [tasks, selectedNextDate, today]);

      const toggleStatus = useCallback((e, id) => {
        e.stopPropagation();
        setTasks(prev => prev.map(t => {
          if (t.id === id) { const s = t.status === 'done' ? 'todo' : 'done'; fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus: s }); return { ...t, status: s }; }
          return t;
        }));
      }, []);

      const toggleDoing = useCallback((e, id) => {
        e.stopPropagation();
        setTasks(prev => prev.map(t => {
          if (t.id === id) { const s = t.status === 'doing' ? 'todo' : 'doing'; fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus: s }); return { ...t, status: s }; }
          return t;
        }));
      }, []);

      const handleSetManualDate = useCallback(v => {
        setSelectedNextDate(v);
        fetchAPI({ action: 'saveLockedNextDate', dateStr: v });
      }, []);

      const handleSaveFavicon = useCallback(async url => {
        setFavicon(url); updateFavicon(url);
        await fetchAPI({ action: 'saveFavicon', faviconUrl: url });
      }, [updateFavicon]);

      const handleSaveSiteTitle = useCallback(async title => {
        setSiteTitle(title); document.title = title;
        await fetchAPI({ action: 'saveSiteTitle', title });
      }, []);

      const handleSaveTask = async (taskData) => {
        const res = await fetchAPI({ action: 'saveOrUpdateTask', task: taskData });
        if (res.status === 'success') {
          setTasks(prev => editingTask ? prev.map(t => t.id === res.task.id ? res.task : t) : [...prev, res.task]);
        }
        setShowModal(false); setEditingTask(null);
      };

      const handleDeleteTask = async (id) => {
        await fetchAPI({ action: 'deleteTask', taskId: id });
        setTasks(prev => prev.filter(t => t.id !== id));
        setShowModal(false); setEditingTask(null);
      };

      const handleUIThemeChange = (id) => {
        setUITheme(id); localStorage.setItem('uiTheme', id);
        const theme = UI_THEMES.find(t => t.id === id);
        document.documentElement.style.setProperty('--accent', theme?.accent || '#e8ff47');
        document.documentElement.style.setProperty('--accent2', theme?.accent2 || '#ff4757');
      };

      const handleFontChange = (fontId) => {
        setCurrentFont(fontId);
        localStorage.setItem('appFont', fontId);
        setActiveFont(fontId);
      };

      const filteredTasks = useMemo(() => tasks.filter(task => {
        const q = searchQuery.toLowerCase();
        const matchSearch = !q || task.client.toLowerCase().includes(q) || task.type.toLowerCase().includes(q) || (task.id && task.id.toLowerCase().includes(q));
        const now = new Date();
        const thisYearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const matchFilter = filterType === 'all' || (filterType === 'pending' && task.status !== 'done') || (filterType === 'done' && task.status === 'done') || (filterType === 'month' && task.deadline && task.deadline.startsWith(thisYearMonth));
        return matchSearch && matchFilter;
      }), [tasks, searchQuery, filterType]);

      const displayedTasks = (isCalendarView && filterType !== 'month') ? filteredTasks.filter(task => task.deadline === selectedDate) : filteredTasks;

      if (isLoading) return (
        <LangContext.Provider value={{ lang, t, setLang }}>
          <div className={`${uiClass}`} style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: 'var(--ink)', fontFamily: 'var(--mono)' }}>
            <div style={{ fontSize: '10px', letterSpacing: '0.4em', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '16px' }}>{t.loading}</div>
            <div style={{ display: 'flex', gap: '6px' }}>
              {[0, 1, 2].map(i => <div key={i} style={{ width: '4px', height: '4px', borderRadius: '50%', background: accent, animation: `blink 1s step-end infinite ${i * 0.2}s` }} />)}
            </div>
          </div>
        </LangContext.Provider>
      );

      return (
        <LangContext.Provider value={{ lang, t, setLang }}>
          <div className={`${uiClass}`} style={{ minHeight: '100vh', background: 'var(--ink)', fontFamily: 'var(--body)' }}>
            <div className="scan-line" />

            <div style={{ maxWidth: '480px', margin: '0 auto', minHeight: '100vh', paddingBottom: '90px', position: 'relative' }}>

              {/* HEADER SECTION */}
              <div style={{ padding: '20px 20px 0', position: 'relative', zIndex: 10 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '6px' }}>
                  <div>
                    <div style={{ fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.3em', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '2px' }}>
                      SYS/{isAdmin ? t.sysAdmin : t.sysGuest}<span className="blink" style={{ color: accent }}>_</span>
                    </div>
                    <div style={{ fontFamily: 'var(--display)', fontSize: '34px', fontWeight: 800, color: 'var(--paper)', letterSpacing: '-1px', lineHeight: 1 }}>
                      {siteTitle}
                    </div>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '8px' }}>
                    <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                      {isAdmin && (
                        <>
                          <button onClick={() => setShowTheme(true)} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', width: '30px', height: '30px', borderRadius: '6px', cursor: 'pointer', fontSize: '13px', display: 'flex', alignItems: 'center', justifyContent: 'center' }} title={t.themeTitle}>🎨</button>
                          <button onClick={() => setShowSettings(true)} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', width: '30px', height: '30px', borderRadius: '6px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Ico.Settings /></button>
                        </>
                      )}
                      <button onClick={() => isAdmin ? setIsAdmin(false) : setShowAuth(true)}
                        style={{ fontFamily: 'var(--mono)', fontSize: '8px', letterSpacing: '0.15em', background: isAdmin ? accent : 'var(--dim)', color: isAdmin ? 'var(--ink)' : 'var(--text-muted)', border: `1px solid ${isAdmin ? accent : 'var(--border)'}`, padding: '6px 10px', borderRadius: '4px', cursor: 'pointer', textTransform: 'uppercase' }}>
                        {isAdmin ? t.logout : t.login}
                      </button>
                    </div>
                    <div onClick={() => isAdmin && setShowProfileImg(true)}
                      style={{ width: '44px', height: '44px', borderRadius: '8px', border: `2px solid ${isAdmin ? `${accent}44` : 'var(--border)'}`, overflow: 'hidden', cursor: isAdmin ? 'pointer' : 'default', flexShrink: 0, background: 'var(--dim)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      {profileImage ? <img src={profileImage} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} /> : <span style={{ fontSize: '20px' }}>🖤</span>}
                    </div>
                  </div>
                </div>

                <div className="ticker-wrap" style={{ borderTop: `1px solid var(--border)`, borderBottom: `1px solid var(--border)`, padding: '6px 0', overflow: 'hidden' }}>
                  <div className="ticker-inner">
                    {[...t.tickerItems, ...t.tickerItems].map((item, i) => (
                      <span key={i} style={{ fontFamily: 'var(--mono)', fontSize: '8px', letterSpacing: '0.3em', color: 'var(--text-muted)', textTransform: 'uppercase', marginRight: '40px' }}>
                        <span style={{ color: accent }}>◆</span> {item}{' '}
                      </span>
                    ))}
                  </div>
                </div>
              </div>

              {/* BANNER SECTION */}
              {bannerImage && isBannerVisible && (
                <div style={{ margin: '16px 20px 0', position: 'relative', borderRadius: '10px', overflow: 'hidden', height: '110px' }}>
                  <img src={bannerImage} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                  <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(0,0,0,0.6), transparent)' }} />
                  {isAdmin && (
                    <div style={{ position: 'absolute', bottom: '8px', right: '8px', display: 'flex', gap: '6px' }}>
                      <button onClick={() => setShowBannerImg(true)} style={{ background: 'rgba(0,0,0,0.7)', border: '1px solid rgba(255,255,255,0.2)', color: 'white', width: '28px', height: '28px', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Ico.Image /></button>
                      <button onClick={() => { setIsBannerVisible(false); fetchAPI({ action: 'saveBannerVisibility', isVisible: false }); }} style={{ background: 'rgba(0,0,0,0.7)', border: '1px solid rgba(255,255,255,0.2)', color: 'white', width: '28px', height: '28px', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Ico.EyeOff /></button>
                    </div>
                  )}
                </div>
              )}
              {!bannerImage && isAdmin && (
                <div onClick={() => setShowBannerImg(true)} style={{ margin: '16px 20px 0', height: '52px', border: `1px dashed var(--border)`, borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: 'var(--text-muted)', fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.2em' }}>
                  {t.addBanner}
                </div>
              )}
              {bannerImage && !isBannerVisible && isAdmin && (
                <div style={{ margin: '16px 20px 0', display: 'flex', justifyContent: 'flex-end' }}>
                  <button onClick={() => { setIsBannerVisible(true); fetchAPI({ action: 'saveBannerVisibility', isVisible: true }); }} style={{ fontFamily: 'var(--mono)', fontSize: '9px', color: 'var(--text-muted)', background: 'none', border: '1px solid var(--border)', padding: '4px 12px', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '6px' }}><Ico.Eye /> {t.showBanner}</button>
                </div>
              )}

              {/* MAIN CONTENT */}
              <div style={{ padding: '20px' }}>
                {view === 'dashboard' ? (
                  <div className="animate-fadeIn">
                    <div style={{ display: 'flex', gap: '10px', marginBottom: '20px' }}>
                      <ProgressWidget progress={progress} doneToday={doneToday} todayLen={todayTasks.length} accent={accent} />
                      <QueueWidget isAdmin={isAdmin} nextQueueDate={nextQueueDate} selectedNextDate={selectedNextDate} handleSetManualDate={handleSetManualDate} waitingCount={waitingCount} accent={accent} />
                    </div>

                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '12px' }}>
                      <span style={{ fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.3em', color: 'var(--text-muted)', textTransform: 'uppercase' }}>{t.todayQueue}</span>
                      <div style={{ flex: 1, height: '1px', background: 'var(--border)' }} />
                      <span style={{ fontFamily: 'var(--mono)', fontSize: '9px', color: accent }}>{todayTasks.length}</span>
                    </div>

                    {todayTasks.length > 0 ? todayTasks.map(tk => (
                      <TaskCard key={tk.id} task={tk} isAdmin={isAdmin} onEdit={task => { setEditingTask(task); setShowModal(true); }} onToggleDoing={toggleDoing} onToggleStatus={toggleStatus} accent={accent} accent2={accent2} />
                    )) : (
                      <div style={{ textAlign: 'center', padding: '40px 0', border: '1px dashed var(--border)', borderRadius: '8px' }}>
                        <div style={{ fontFamily: 'var(--mono)', fontSize: '10px', letterSpacing: '0.3em', color: 'var(--text-muted)' }}>{t.noTasksToday}</div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="animate-fadeIn">
                    <div style={{ position: 'relative', marginBottom: '12px' }}>
                      <div style={{ position: 'absolute', left: '14px', top: '50%', transform: 'translateY(-50%)', color: 'var(--text-muted)' }}><Ico.Search /></div>
                      <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                        style={{ width: '100%', background: 'var(--dim)', border: '1px solid var(--border)', color: 'var(--paper)', padding: '12px 12px 12px 40px', borderRadius: '8px', fontFamily: 'var(--mono)', fontSize: '11px', outline: 'none', boxSizing: 'border-box' }}
                        placeholder={t.searchPlaceholder} />
                    </div>

                    <div style={{ display: 'flex', gap: '6px', marginBottom: '12px', flexWrap: 'wrap' }}>
                      {[['all', t.filterAll], ['pending', t.filterPending], ['done', t.filterDone], ['month', t.filterMonth]].map(([v, label]) => (
                        <button key={v} onClick={() => { setFilterType(v); if (v === 'month') setIsCalendarView(false); }}
                          style={{ flex: 1, minWidth: 0, padding: '8px 4px', fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.05em', border: '1px solid', borderColor: filterType === v ? accent : 'var(--border)', background: filterType === v ? `${accent}22` : 'transparent', color: filterType === v ? accent : 'var(--text-muted)', borderRadius: '4px', cursor: 'pointer', transition: 'all 0.15s', whiteSpace: 'nowrap' }}>
                          {label}
                        </button>
                      ))}
                      <button onClick={() => { setIsCalendarView(!isCalendarView); if (!isCalendarView) setFilterType('all'); }}
                        style={{ padding: '8px 12px', fontFamily: 'var(--mono)', fontSize: '9px', border: '1px solid', borderColor: isCalendarView ? accent : 'var(--border)', background: isCalendarView ? `${accent}22` : 'transparent', color: isCalendarView ? accent : 'var(--text-muted)', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0 }}>
                        <Ico.Cal />{t.filterCal}
                      </button>
                    </div>

                    {isCalendarView && <CalendarView currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} selectedDate={selectedDate} setSelectedDate={setSelectedDate} today={today} tasks={tasks} accent={accent} />}

                    <div style={{ fontFamily: 'var(--mono)', fontSize: '9px', color: 'var(--text-muted)', letterSpacing: '0.15em', marginBottom: '10px' }}>
                      {displayedTasks.length} {t.results}
                    </div>

                    {displayedTasks.length > 0 ? displayedTasks.map(tk => (
                      <TaskCard key={tk.id} task={tk} isAdmin={isAdmin} onEdit={task => { setEditingTask(task); setShowModal(true); }} onToggleDoing={toggleDoing} onToggleStatus={toggleStatus} accent={accent} accent2={accent2} />
                    )) : (
                      <div style={{ textAlign: 'center', padding: '40px 0', border: '1px dashed var(--border)', borderRadius: '8px' }}>
                        <div style={{ fontFamily: 'var(--mono)', fontSize: '10px', letterSpacing: '0.3em', color: 'var(--text-muted)' }}>{t.noRecords}</div>
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* BOTTOM NAVIGATION */}
              <div style={{ position: 'fixed', bottom: '20px', left: '50%', transform: 'translateX(-50%)', zIndex: 50 }}>
                <div style={{ background: 'var(--dim)', border: '1px solid var(--border)', borderRadius: '50px', padding: '8px 12px', display: 'flex', alignItems: 'center', gap: '4px', boxShadow: `0 20px 40px -10px rgba(0,0,0,0.5)` }}>
                  <button onClick={() => setView('dashboard')}
                    style={{ width: '40px', height: '40px', borderRadius: '40px', border: 'none', background: view === 'dashboard' ? `${accent}22` : 'transparent', color: view === 'dashboard' ? accent : 'var(--text-muted)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.15s' }}>
                    <Ico.Home />
                  </button>
                  {isAdmin && (
                    <button onClick={() => { setEditingTask(null); setShowModal(true); }}
                      style={{ width: '48px', height: '48px', borderRadius: '50%', border: 'none', background: accent, color: 'var(--ink)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, boxShadow: `0 0 20px ${accent}44`, transition: 'all 0.15s' }}
                      className="pulse-accent">
                      <Ico.Plus />
                    </button>
                  )}
                  <button onClick={() => setView('all')}
                    style={{ width: '40px', height: '40px', borderRadius: '40px', border: 'none', background: view === 'all' ? `${accent}22` : 'transparent', color: view === 'all' ? accent : 'var(--text-muted)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.15s' }}>
                    <Ico.List />
                  </button>
                </div>
              </div>

            </div>

            {/* MODALS */}
            {showModal && <TaskFormModal editingTask={editingTask} taskTypes={taskTypes} channels={channels} nextQueueDate={nextQueueDate} onClose={() => { setShowModal(false); setEditingTask(null); }} onSave={handleSaveTask} onDelete={handleDeleteTask} accent={accent} accent2={accent2} />}
            {showAuth && <AuthModal onClose={() => setShowAuth(false)} onLogin={() => { setIsAdmin(true); setShowAuth(false); }} accent={accent} />}
            {showSettings && <SiteSettingsModal onClose={() => setShowSettings(false)} currentFavicon={favicon} currentSiteTitle={siteTitle} onSaveFavicon={handleSaveFavicon} onSaveSiteTitle={handleSaveSiteTitle} accent={accent} />}
            {showTheme && <ThemeManager onClose={() => setShowTheme(false)} uiTheme={uiTheme} onUIThemeChange={handleUIThemeChange} currentFont={currentFont} onFontChange={handleFontChange} />}
            {showProfileImg && <ImageModal onClose={() => setShowProfileImg(false)} titleKey="updateProfile" accent={accent} onSave={url => { setProfileImage(url); fetchAPI({ action: 'saveProfileImage', imageUrl: url }); setShowProfileImg(false); }} />}
            {showBannerImg && <ImageModal onClose={() => setShowBannerImg(false)} titleKey="updateBanner" accent={accent} onSave={url => { setBannerImage(url); setIsBannerVisible(true); fetchAPI({ action: 'saveBannerImage', imageUrl: url }); fetchAPI({ action: 'saveBannerVisibility', isVisible: true }); setShowBannerImg(false); }} />}
          </div>
        </LangContext.Provider>
      );
    }

    // ============================================
    // RENDER APPLICATION
    // ============================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
