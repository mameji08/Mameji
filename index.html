    /* Helper function for API calls */
    window.fetchAPI = function (payload) {

  <title id="site-title">Mameji</title>

  <style>
    /* ============================================ */
    /* RESET & BASE STYLES                           */
    /* ============================================ */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0a0a0a;
    }

    /* ============================================ */
    /* CSS CUSTOM PROPERTIES (VARIABLES)            */
    /* ============================================ */
    :root {
      --ink: #0a0a0a;
      /* Text color on light backgrounds */
      --paper: #f0ede6;
      /* Background color for light theme */
      --accent: #e8ff47;
      /* Primary accent color (lime) */
      --accent2: #ff4757;
      /* Secondary accent color (red) */
      --dim: #1a1a1a;
      /* Dark surface background */
      --muted: #2e2e2e;
      /* Muted background for inputs */
      --text-muted: #888;
      /* Muted text color */
      --border: #2e2e2e;
      /* Border color */
      --mono: 'Space Mono', monospace;
      /* Monospace font */
      --display: 'Syne', sans-serif;
      /* Display font for headings */
      --body: 'Sarabun', sans-serif;
      /* Body text font */
      --bg-from: #0a0a0a;
      /* Gradient start color */
      --bg-to: #1a1a1a;
      /* Gradient end color */
    }

    /* ============================================ */
    /* FONT FAMILY CLASSES                           */
    /* ============================================ */
    /* แต่ละ class จะ override CSS variables ด้วยฟอนต์ที่เลือก */
    .font-playpen {
      --mono: 'Playpen Sans Thai', cursive;
      --display: 'Playpen Sans Thai', cursive;
      --body: 'Playpen Sans Thai', cursive;
    }

    .font-kanit {
      --mono: 'Kanit', sans-serif;
      --display: 'Kanit', sans-serif;
      --body: 'Kanit', sans-serif;
    }

    .font-kanit-prompt {
      --mono: 'Prompt', sans-serif;
      --display: 'Kanit', sans-serif;
      --body: 'Prompt', sans-serif;
    }

    .font-noto {
      --mono: 'Noto Sans Thai', sans-serif;
      --display: 'Kanit', sans-serif;
      --body: 'Noto Sans Thai', sans-serif;
    }

    .font-itim {
      --mono: 'Itim', cursive;
      --display: 'Kanit', sans-serif;
      --body: 'Itim', cursive;
    }

    .font-complete {
      --mono: 'K2D', sans-serif;
      --display: 'Sriracha', cursive;
      --body: 'K2D', sans-serif;
    }

    /* ============================================ */
    /* UTILITY CLASSES                               */
    /* ============================================ */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* ============================================ */
    /* ANIMATIONS                                   */
    /* ============================================ */
    @keyframes scan {
      0% {
        transform: translateY(-100%);
      }

      100% {
        transform: translateY(100vh);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    @keyframes slideInUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(232, 255, 71, 0.4);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(232, 255, 71, 0);
      }
    }

    @keyframes ticker {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    /* ============================================ */
    /* ✨ NEW: GLITCH EFFECT                        */
    /* ============================================ */
    /* สร้างเอฟเฟกต์ตัวอักษรกระตุก (glitch) */
    @keyframes glitch1 {

      0%,
      85%,
      100% {
        clip-path: inset(0 0 98% 0);
        transform: translateX(0);
        opacity: 0;
      }

      87% {
        clip-path: inset(10% 0 60% 0);
        transform: translateX(-4px);
        opacity: 0.8;
        color: #ff4757;
      }

      89% {
        clip-path: inset(40% 0 30% 0);
        transform: translateX(4px);
        opacity: 0.8;
      }

      91% {
        clip-path: inset(70% 0 5% 0);
        transform: translateX(-2px);
        opacity: 0.6;
      }

      93% {
        opacity: 0;
      }
    }

    @keyframes glitch2 {

      0%,
      88%,
      100% {
        clip-path: inset(0 0 98% 0);
        transform: translateX(0);
        opacity: 0;
      }

      90% {
        clip-path: inset(60% 0 10% 0);
        transform: translateX(3px);
        opacity: 0.7;
        color: #00ffcc;
      }

      92% {
        clip-path: inset(20% 0 50% 0);
        transform: translateX(-3px);
        opacity: 0.7;
      }

      94% {
        opacity: 0;
      }
    }

    .glitch {
      position: relative;
      display: inline-block;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      font: inherit;
      letter-spacing: inherit;
      line-height: inherit;
    }

    .glitch::before {
      animation: glitch1 6s infinite;
    }

    .glitch::after {
      animation: glitch2 6s infinite 0.15s;
    }

    /* ============================================ */
    /* ✨ NEW: SHIMMER ANIMATION                    */
    /* ============================================ */
    /* ใช้กับ progress bar เพื่อให้มีแสงวิ่ง */
    @keyframes shimmer {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(200%);
      }
    }

    .shimmer-bar {
      position: relative;
      overflow: hidden;
    }

    .shimmer-bar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.5) 50%, transparent 100%);
      animation: shimmer 2s infinite;
      width: 60%;
    }

    /* ============================================ */
    /* ✨ NEW: CARD HOVER EFFECTS                   */
    /* ============================================ */
    /* การ์ดงานมีการขยายเล็กน้อยเมื่อ hover */
    .task-card {
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.18s ease;
      cursor: pointer;
    }

    .task-card:hover {
      transform: scale(1.025) translateY(-1px);
    }

    .task-card:active {
      transform: scale(0.975);
    }

    .task-card-guest {
      transition: transform 0.18s ease;
    }

    .task-card-guest:hover {
      transform: translateX(3px);
    }

    /* ============================================ */
    /* ✨ NEW: TOAST ANIMATION                      */
    /* ============================================ */
    /* แจ้งเตือนเลื่อนเข้ามาจากขวา */
    @keyframes toastIn {
      from {
        transform: translateX(120%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes toastOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }

      to {
        transform: translateX(120%);
        opacity: 0;
      }
    }

    .toast-enter {
      animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .toast-exit {
      animation: toastOut 0.3s ease both;
    }

    /* ============================================ */
    /* ✨ NEW: NAV BUTTON GLOW                      */
    /* ============================================ */
    /* ปุ่มเพิ่มงานมีการเรืองแสงเป็นจังหวะ */
    @keyframes navGlow {

      0%,
      100% {
        box-shadow: 0 0 8px rgba(232, 255, 71, 0.3);
      }

      50% {
        box-shadow: 0 0 20px rgba(232, 255, 71, 0.7), 0 0 40px rgba(232, 255, 71, 0.2);
      }
    }

    .nav-add-btn {
      animation: navGlow 2.5s ease-in-out infinite;
    }

    /* ============================================ */
    /* EXISTING ANIMATIONS                          */
    /* ============================================ */
    .animate-slideInUp {
      animation: slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .animate-fadeIn {
      animation: fadeIn 0.3s ease both;
    }

    /* เส้นสแกนแนวตั้งเคลื่อนที่ */
    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      animation: scan 8s linear infinite;
      opacity: 0.15;
      pointer-events: none;
      z-index: 9999;
    }

    .blink {
      animation: blink 1s step-end infinite;
    }

    .ticker-wrap {
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker-inner {
      display: inline-flex;
      animation: ticker 20s linear infinite;
    }

    .spin-slow {
      animation: spin 8s linear infinite;
    }

    .pulse-accent {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .theme-gradient {
      background: linear-gradient(135deg, var(--bg-from), var(--bg-to)) !important;
    }

    /* ============================================ */
    /* THEME VARIATIONS                             */
    /* ============================================ */
    .theme-light {
      --ink: #0a0a0a;
      --paper: #0a0a0a;
      --dim: #e8e4dc;
      --muted: #d0ccc3;
      --text-muted: #666;
      --border: #c8c4bc;
      background: #f0ede6 !important;
      color: #0a0a0a;
    }

    .theme-neon {
      --ink: #080816;
      --paper: #0f0f23;
      --accent: #00ffcc;
      --dim: #12122a;
      --muted: #1a1a35;
      --text-muted: #5566aa;
      --border: #1e1e40;
    }

    .theme-rust {
      --accent: #ff6b35;
      --accent2: #ffd700;
    }

    /* ============================================ */
    /* INPUT STYLES                                  */
    /* ============================================ */
    /* ทำให้ date picker เป็นสีขาว (invert) */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    .theme-light input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0);
    }

    /* ============================================ */
    /* BACKGROUND EFFECTS                            */
    /* ============================================ */
    /* ตารางเส้นทับ (grid noise) */
    .grid-noise {
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255, 255, 255, 0.03) 39px, rgba(255, 255, 255, 0.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255, 255, 255, 0.03) 39px, rgba(255, 255, 255, 0.03) 40px);
    }

    /* ============================================ */
    /* STATUS STYLES (left border)                  */
    /* ============================================ */
    .status-todo {
      border-left: 3px solid #555;
    }

    .status-doing {
      border-left: 3px solid var(--accent);
    }

    .status-done {
      border-left: 3px solid #444;
      opacity: 0.55;
    }

    /* ============================================ */
    /* CHANNEL COLOR STYLES                          */
    /* ============================================ */
    /* สีตามช่องทางการติดต่อ */
    .ch-LINE {
      background: #1a2e1a;
      color: #7ec87e;
      border-color: #2d4d2d;
    }

    .ch-FB,

    /* ============================================ */
    /* HELPER: setActiveFont                         */
    /* ============================================ */
    /* ฟังก์ชันสำหรับเปลี่ยนฟอนต์:
       - ปิดการใช้งานฟอนต์ทั้งหมดก่อน
       - เปิดใช้งานฟอนต์ที่เลือก
       - เพิ่ม class ที่ body
    */
    const setActiveFont = (fontId) => {
      const fontIds = ['default', 'playpen', 'kanit', 'kanit-prompt', 'noto', 'itim', 'complete', 'anuphan', 'baijamjuree', 'chakrapetch', 'charm', 'charmonman', 'ibmplex', 'k2d', 'mali', 'mitr', 'niramit', 'prompt', 'sarabun', 'sriracha', 'taviraj', 'trirong'];
      fontIds.forEach(id => { const el = document.getElementById(`font-${id}`); if (el) el.setAttribute('disabled', 'disabled'); });
      fontIds.forEach(id => { if (id !== 'default') document.body.classList.remove(`font-${id}`); });
      if (fontId !== 'default') {
        const el = document.getElementById(`font-${fontId}`);
        if (el) el.removeAttribute('disabled');
        document.body.classList.add(`font-${fontId}`);
      } else {
        const el = document.getElementById('font-default');
        if (el) el.removeAttribute('disabled');
      }
    };
