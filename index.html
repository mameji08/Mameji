      Props:
        - toasts: array ของ toast objects { id, msg, type, accent }
    */
    const Toast = ({ toasts }) => (
      <div style={{ position: 'fixed', top: '16px', right: '16px', zIndex: 9999, display: 'flex', flexDirection: 'column', gap: '8px', pointerEvents: 'none' }}>
        {toasts.map(toast => (
          <div key={toast.id}
            className="toast-enter"
            style={{
              display: 'flex', alignItems: 'center', gap: '10px',
              padding: '12px 18px', borderRadius: '10px',
              background: toast.type === 'error' ? 'rgba(255,71,87,0.15)' : 'rgba(0,0,0,0.85)',
              border: `1px solid ${toast.type === 'error' ? '#ff4757' : toast.accent || '#e8ff47'}`,
              color: toast.type === 'error' ? '#ff4757' : toast.accent || '#e8ff47',
              fontFamily: 'var(--mono)', fontSize: '11px', letterSpacing: '0.1em',
              backdropFilter: 'blur(12px)',
              boxShadow: `0 8px 32px rgba(0,0,0,0.4), 0 0 20px ${toast.type === 'error' ? '#ff475722' : (toast.accent || '#e8ff47') + '22'}`,
              whiteSpace: 'nowrap',
            }}>
            <span style={{ fontSize: '14px' }}>{toast.type === 'error' ? '✕' : '✓'}</span>
            {toast.msg}
          </div>
        ))}
      </div>
    );

    /* ============================================ */
    /* ✨ NEW: PARTICLE CANVAS COMPONENT              */
    /* ============================================ */
    /* 
      ParticleCanvas: สร้างเอฟเฟกต์อนุภาคเคลื่อนไหว
      Props:
        - accent: สีหลักสำหรับอนุภาคและเส้นเชื่อม
    */
    const ParticleCanvas = ({ accent }) => {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        resize();
        window.addEventListener('resize', resize);

        // สร้างอนุภาค 150 จุดแบบสุ่ม
        const dots = Array.from({ length: 50 }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          r: Math.random() * 2.5 + 1.5,
          opacity: Math.random() * 0.3 + 0.7,
        }));

        let raf;
        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          dots.forEach(d => {
            d.x += d.vx; d.y += d.vy;
            if (d.x < 0 || d.x > canvas.width) d.vx *= -1;
            if (d.y < 0 || d.y > canvas.height) d.vy *= -1;
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
            ctx.fillStyle = accent + Math.floor(d.opacity * 255).toString(16).padStart(2, '0');
            ctx.fill();
          });

          // วาดเส้นเชื่อมระหว่างอนุภาคที่ใกล้กัน
          for (let i = 0; i < dots.length; i++) {
            for (let j = i + 1; j < dots.length; j++) {
              const dx = dots[i].x - dots[j].x;
              const dy = dots[i].y - dots[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 100) {
                const alpha = Math.floor((1 - dist / 100) * 200).toString(16).padStart(2, '0');
                ctx.beginPath();
                ctx.strokeStyle = accent + alpha;
                ctx.lineWidth = 1.2;
                ctx.moveTo(dots[i].x, dots[i].y);
                ctx.lineTo(dots[j].x, dots[j].y);
                ctx.stroke();
              }
            }
          }
          raf = requestAnimationFrame(draw);
        };
        draw();
        return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
      }, [accent]);

      return <canvas ref={canvasRef} style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 0, opacity: 0.18 }} />;
    };

    /* ============================================ */
    /* MODAL WRAPPER COMPONENT                        */
    /* ============================================ */
    /* 
      Modal: พื้นหลังมืดและ container สำหรับ modal
      Props:
        - onClose: ฟังก์ชันปิด modal
        - children: เนื้อหาที่จะแสดงใน modal
        - wide: ถ้า true จะกว้างขึ้น (max-w-lg)
    */
    const Modal = ({ onClose, children, wide }) => (
      <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center animate-fadeIn modal-overlay" onClick={onClose}>
        <div className={`w-full ${wide ? 'max-w-lg' : 'max-w-sm'} animate-slideInUp`}
          style={{ background: 'var(--dim)', border: '1px solid var(--border)', borderRadius: '20px 20px 0 0', maxHeight: '90vh', overflowY: 'auto' }}
          onClick={e => e.stopPropagation()}>
          {children}
        </div>
      </div>
    );

    /* ============================================ */
    /* THEME MANAGER COMPONENT                        */
    /* ============================================ */
    /* 
      ThemeManager: จัดการธีม, ฟอนต์, ภาษา
      Props:
        - onClose: ปิด modal
        - uiTheme: ธีมปัจจุบัน
        - onUIThemeChange: เปลี่ยนธีม
        - currentFont: ฟอนต์ปัจจุบัน
        - onFontChange: เปลี่ยนฟอนต์
    */
    const ThemeManager = ({ onClose, uiTheme, onUIThemeChange, currentFont, onFontChange }) => {
      const { t, lang, setLang } = useLang();
      const [tab, setTab] = useState('ui');
      const handleFontChange = (fontId) => { onFontChange(fontId); setActiveFont(fontId); };
      return (
        <Modal onClose={onClose} wide>
          <div style={{ padding: '24px', fontFamily: 'var(--mono)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
              <span style={{ fontSize: '11px', letterSpacing: '0.2em', color: 'var(--accent)', textTransform: 'uppercase' }}>{t.themeTitle}</span>
              <button onClick={onClose} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', padding: '4px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '11px' }}>ESC</button>
            </div>
            <div style={{ display: 'flex', gap: '6px', marginBottom: '20px' }}>
              {['ui', 'font', 'lang'].map(tb => (
                <button key={tb} onClick={() => setTab(tb)}
                  style={{ flex: 1, padding: '8px', border: '1px solid', borderColor: tab === tb ? 'var(--accent)' : 'var(--border)', background: tab === tb ? 'var(--accent)' : 'transparent', color: tab === tb ? 'var(--ink)' : 'var(--text-muted)', fontSize: '9px', letterSpacing: '0.1em', textTransform: 'uppercase', cursor: 'pointer', borderRadius: '4px', fontFamily: 'var(--mono)' }}>
                  {tb === 'ui' ? t.uiSkin : tb === 'font' ? t.fontFamily : t.language}
                </button>
              ))}
            </div>
            {tab === 'ui' && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', maxHeight: '400px', overflowY: 'auto' }}>
                {UI_THEMES.map(th => (
                  <button key={th.id} onClick={() => { onUIThemeChange(th.id); onClose(); }}
                    style={{ padding: '16px', border: '1px solid', borderColor: uiTheme === th.id ? th.accent : 'var(--border)', background: `linear-gradient(135deg, ${th.bgFrom}, ${th.bgTo})`, borderRadius: '8px', cursor: 'pointer', fontFamily: 'var(--mono)', fontSize: '11px', color: th.accent, letterSpacing: '0.1em', textShadow: '0 0 5px rgba(0,0,0,0.5)', transition: 'transform 0.15s', transform: uiTheme === th.id ? 'scale(1.03)' : 'scale(1)' }}>
                    {th.name}{uiTheme === th.id && <span style={{ marginLeft: '8px' }}>✓</span>}
                  </button>
                ))}
              </div>
            )}
            {tab === 'font' && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '10px', maxHeight: '400px', overflowY: 'auto' }}>
                {FONT_OPTIONS.map(font => (
                  <button key={font.id} onClick={() => handleFontChange(font.id)}
                    style={{ padding: '20px', border: '1px solid', borderColor: currentFont === font.id ? 'var(--accent)' : 'var(--border)', background: currentFont === font.id ? 'var(--accent)22' : 'transparent', borderRadius: '8px', cursor: 'pointer', textAlign: 'left', transition: 'all 0.15s' }}>
                    <div style={{ fontSize: '14px', marginBottom: '4px', fontFamily: 'var(--body)' }}>{font.name}</div>
                    <div style={{ fontSize: '10px', color: 'var(--text-muted)', fontFamily: 'var(--mono)' }}>{font.description}</div>
                    {currentFont === font.id && <div style={{ fontSize: '10px', color: 'var(--accent)', marginTop: '8px' }}>✓</div>}
                  </button>
                ))}
              </div>
            )}
            {tab === 'lang' && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px' }}>
                {Object.entries(TRANSLATIONS).map(([code, tr]) => (
                  <button key={code} onClick={() => { setLang(code); localStorage.setItem('appLang', code); onClose(); }}
                    style={{ padding: '20px 8px', border: '1px solid', borderColor: lang === code ? 'var(--accent)' : 'var(--border)', background: lang === code ? 'var(--accent)22' : 'transparent', borderRadius: '8px', cursor: 'pointer', textAlign: 'center', transition: 'all 0.15s' }}>
                    <div style={{ fontSize: '24px', marginBottom: '6px' }}>{tr.langFlag}</div>
                    <div style={{ fontSize: '10px', color: lang === code ? 'var(--accent)' : 'var(--text-muted)', fontWeight: 700, fontFamily: 'var(--mono)' }}>{tr.langName}</div>
                    {lang === code && <div style={{ fontSize: '10px', color: 'var(--accent)', marginTop: '4px' }}>✓</div>}
                  </button>
                ))}
              </div>
            )}
          </div>
        </Modal>
      );
    };

    /* ============================================ */
    /* TASK CARD COMPONENT — ✨ with hover + glow     */
    /* ============================================ */
    /* 
      TaskCard: แสดงข้อมูลงานแต่ละรายการ
      Props:
        - task: ข้อมูลงาน { id, client, channel, type, details, deadline, status, priority }
        - isAdmin: โหมดแอดมิน (แก้ไขได้)
        - onEdit: เรียกเมื่อคลิกการ์ด (สำหรับแอดมิน)
        - onToggleDoing: เปลี่ยนสถานะเป็น doing/todo
        - onToggleStatus: เปลี่ยนสถานะเป็น done/todo
        - accent, accent2: สีหลัก
    */
    const TaskCard = ({ task, isAdmin, onEdit, onToggleDoing, onToggleStatus, accent, accent2 }) => {
      const { t } = useLang();
      const chClass = task.channel === 'LINE' ? 'ch-LINE' : task.channel === 'FB' || task.channel === 'FACEBOOK' ? 'ch-FB' : task.channel === 'IG' ? 'ch-IG' : (task.channel === 'DISCORD' || task.channel === 'Discord') ? 'ch-DISCORD' : 'ch-other';
      const statusClass = `status-${task.status}`;

      return (
        <div
          onClick={() => isAdmin && onEdit(task)}
          className={`${statusClass} ${isAdmin ? 'task-card' : 'task-card-guest'}`}
          style={{
            background: 'var(--dim)',
            border: '1px solid var(--border)',
            borderRadius: '8px',
            padding: '14px 16px',
            cursor: isAdmin ? 'pointer' : 'default',
            marginBottom: '8px',
            position: 'relative',
            overflow: 'hidden',
            boxShadow: task.status === 'doing' ? `0 0 20px ${accent}18, 0 2px 8px rgba(0,0,0,0.3)` : task.status === 'done' ? 'none' : '0 2px 8px rgba(0,0,0,0.2)',
          }}
        >
          {task.status === 'doing' && (
            <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '2px', background: `linear-gradient(to right, transparent, ${accent}, transparent)`, opacity: 0.9 }} />
          )}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '8px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', minWidth: 0 }}>
              <span style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: '14px', color: task.status === 'done' ? 'var(--text-muted)' : 'var(--paper)', textDecoration: task.status === 'done' ? 'line-through' : 'none', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: '140px' }}>
                {task.client}
              </span>
              <span className={chClass} style={{ fontFamily: 'var(--mono)', fontSize: '8px', padding: '2px 8px', borderRadius: '3px', border: '1px solid', letterSpacing: '0.1em', fontWeight: 700, textTransform: 'uppercase', flexShrink: 0 }}>
                {task.channel}
              </span>
              {task.priority === 'urgent' && (
                <span style={{ fontFamily: 'var(--mono)', fontSize: '8px', color: accent2, border: `1px solid ${accent2}`, padding: '2px 8px', borderRadius: '3px', flexShrink: 0, animation: 'blink 2s step-end infinite' }}>งานด่วน</span>
              )}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px', flexShrink: 0 }}>
              {isAdmin ? (
                <>
                  <button onClick={e => { e.stopPropagation(); onToggleDoing(e, task.id); }}
                    className="transition-all duration-150 hover:scale-110 active:scale-90"
                    style={{ width: '26px', height: '26px', borderRadius: '4px', border: '1px solid', borderColor: task.status === 'doing' ? accent : 'var(--border)', background: task.status === 'doing' ? `${accent}22` : 'transparent', color: task.status === 'doing' ? accent : 'var(--text-muted)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                    <span className={task.status === 'doing' ? 'spin-slow' : ''} style={{ display: 'flex' }}><Ico.Loader size={12} /></span>
                  </button>
                  <button onClick={e => { e.stopPropagation(); onToggleStatus(e, task.id); }}
                    className="transition-all duration-150 hover:scale-110 active:scale-90"
                    style={{ width: '26px', height: '26px', borderRadius: '4px', border: '1px solid', borderColor: task.status === 'done' ? '#4caf50' : 'var(--border)', background: task.status === 'done' ? '#4caf5022' : 'transparent', color: task.status === 'done' ? '#4caf50' : 'var(--text-muted)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                    <Ico.Check />
                  </button>
                </>
              ) : (
                <span style={{ fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.1em', color: task.status === 'doing' ? accent : task.status === 'done' ? '#4caf50' : 'var(--text-muted)', border: '1px solid', borderColor: task.status === 'doing' ? `${accent}44` : task.status === 'done' ? '#4caf5044' : 'var(--border)', padding: '3px 8px', borderRadius: '3px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                  {task.status === 'doing' && <><span className="spin-slow" style={{ display: 'flex' }}><Ico.Loader size={9} /></span> {t.statusWip}</>}
                  {task.status === 'done' && <><Ico.Check /> {t.statusDone}</>}
                  {task.status === 'todo' && <><Ico.Clock /> {t.statusWait}</>}
                </span>
              )}
            </div>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ minWidth: 0 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>{task.type}</span>
              {task.details && <div style={{ fontFamily: 'var(--body)', fontSize: '11px', color: task.status === 'done' ? 'var(--text-muted)' : 'var(--paper)', marginTop: '2px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '200px', textDecoration: task.status === 'done' ? 'line-through' : 'none' }}>{task.details}</div>}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '4px', color: 'var(--text-muted)', fontFamily: 'var(--mono)', fontSize: '10px', flexShrink: 0 }}>
              <Ico.Cal />
              {new Date(task.deadline).toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' })}
            </div>
          </div>
        </div>
      );
    };

    /* ============================================ */
    /* CALENDAR VIEW COMPONENT                        */
    /* ============================================ */
    /* 
      CalendarView: แสดงปฏิทินรายเดือน
      Props:
        - currentMonth: วันที่ของเดือนที่แสดง
        - setCurrentMonth: เปลี่ยนเดือน
        - selectedDate: วันที่เลือก (YYYY-MM-DD)
        - setSelectedDate: เปลี่ยนวันที่เลือก
        - today: วันที่วันนี้
        - tasks: รายการงานทั้งหมด
        - accent: สีหลัก
    */
    const CalendarView = ({ currentMonth, setCurrentMonth, selectedDate, setSelectedDate, today, tasks, accent }) => {
      const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();
      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);
      const MONTHS = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
      const DAYS = ["SU", "MO", "TU", "WE", "TH", "FR", "SA"];
      return (
        <div style={{ background: 'var(--dim)', border: '1px solid var(--border)', borderRadius: '12px', padding: '20px', marginBottom: '16px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
            <button onClick={() => setCurrentMonth(new Date(year, month - 1, 1))} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', width: '28px', height: '28px', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }} className="transition-all hover:border-[var(--accent)] hover:text-[var(--accent)]"><Ico.Chevron dir="left" /></button>
            <span style={{ fontFamily: 'var(--mono)', fontSize: '13px', letterSpacing: '0.2em', color: accent }}>{MONTHS[month]} {year}</span>
            <button onClick={() => setCurrentMonth(new Date(year, month + 1, 1))} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', width: '28px', height: '28px', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }} className="transition-all hover:border-[var(--accent)] hover:text-[var(--accent)]"><Ico.Chevron /></button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '4px', marginBottom: '8px' }}>
            {DAYS.map(d => <div key={d} style={{ textAlign: 'center', fontFamily: 'var(--mono)', fontSize: '9px', color: 'var(--text-muted)', letterSpacing: '0.1em' }}>{d}</div>)}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '4px' }}>
            {days.map((day, idx) => {
              if (!day) return <div key={`e-${idx}`} />;
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
              const isSelected = selectedDate === dateStr, isToday = today === dateStr;
              const hasTasks = tasks.some(t => t.deadline === dateStr);
              return (
                <div key={dateStr} onClick={() => setSelectedDate(dateStr)}
                  className="transition-all duration-100 hover:scale-105"
                  style={{ height: '34px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', borderRadius: '4px', cursor: 'pointer', background: isSelected ? accent : isToday ? `${accent}22` : 'transparent', border: `1px solid ${isSelected ? accent : isToday ? `${accent}66` : 'transparent'}`, position: 'relative' }}>
                  <span style={{ fontFamily: 'var(--mono)', fontSize: '11px', color: isSelected ? 'var(--ink)' : isToday ? accent : 'var(--paper)', fontWeight: isSelected || isToday ? 700 : 400 }}>{day}</span>
                  {hasTasks && !isSelected && <div style={{ width: '4px', height: '4px', borderRadius: '50%', background: accent, position: 'absolute', bottom: '3px' }} />}
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    /* ============================================ */
    /* ✨ PROGRESS WIDGET — with shimmer bar         */
    /* ============================================ */
    /* 
      ProgressWidget: แสดงความคืบหน้าของงานวันนี้
      Props:
        - progress: เปอร์เซ็นต์ความสำเร็จ (0-100)
        - doneToday: จำนวนที่เสร็จแล้ววันนี้
        - todayLen: จำนวนงานทั้งหมดวันนี้
        - accent: สีหลัก
    */
    const ProgressWidget = ({ progress, doneToday, todayLen, accent }) => {
      const { t } = useLang();
      return (
        <div style={{ background: 'var(--dim)', border: '1px solid var(--border)', borderRadius: '12px', padding: '16px', flex: '1' }}>
          <div style={{ fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.2em', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '10px' }}>{t.today}</div>
          <div style={{ fontFamily: 'var(--display)', fontSize: '36px', fontWeight: 800, color: progress === 100 && todayLen > 0 ? accent : 'var(--paper)', lineHeight: 1, marginBottom: '8px', transition: 'color 0.5s ease' }}>
            {progress}<span style={{ fontSize: '16px', fontWeight: 400, color: 'var(--text-muted)' }}>%</span>
          </div>
          {/* ✨ Shimmer progress bar */}
          <div style={{ height: '4px', background: 'var(--muted)', borderRadius: '2px', overflow: 'hidden', marginBottom: '8px' }}>
            <div className={progress > 0 ? 'shimmer-bar' : ''}
              style={{ height: '100%', width: `${progress}%`, background: progress === 100 ? accent : `linear-gradient(90deg, ${accent}aa, ${accent})`, borderRadius: '2px', transition: 'width 0.6s cubic-bezier(0.34,1.56,0.64,1)' }} />
          </div>
          <div style={{ fontFamily: 'var(--mono)', fontSize: '9px', color: 'var(--text-muted)' }}>{doneToday}/{todayLen} {t.tasks}</div>
        </div>
      );
    };

    /* ============================================ */
    /* QUEUE WIDGET                                  */
    /* ============================================ */
    /* 
      QueueWidget: แสดงคิวถัดไป
      Props:
        - isAdmin: โหมดแอดมิน (สามารถเลือกวันที่เองได้)
        - nextQueueDate: วันที่คิวถัดไป
        - selectedNextDate: วันที่ที่แอดมินเลือก
        - handleSetManualDate: ฟังก์ชันเปลี่ยนวันที่
        - waitingCount: จำนวนงานที่รอ
        - accent: สีหลัก
    */
    const QueueWidget = ({ isAdmin, nextQueueDate, selectedNextDate, handleSetManualDate, waitingCount, accent }) => {
      const { t } = useLang();
      return (
        <div style={{ background: 'var(--dim)', border: '1px solid var(--border)', borderRadius: '12px', padding: '16px', flex: '1', position: 'relative' }}>
          {isAdmin && <input type="date" value={selectedNextDate || nextQueueDate} onChange={e => handleSetManualDate(e.target.value)} style={{ position: 'absolute', inset: 0, opacity: 0, cursor: 'pointer', width: '100%', height: '60%', zIndex: 1 }} />}
          <div style={{ fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.2em', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '10px' }}>{t.nextSlot}</div>
          <div style={{ fontFamily: 'var(--display)', fontSize: '32px', fontWeight: 800, color: 'var(--paper)', lineHeight: 1 }}>
            {new Date(nextQueueDate).getDate()}
          </div>
          <div style={{ fontFamily: 'var(--mono)', fontSize: '10px', color: accent, marginBottom: '8px' }}>
            {new Date(nextQueueDate).toLocaleDateString('en-US', { month: 'short', year: 'numeric' }).toUpperCase()}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
            <div style={{ width: '6px', height: '6px', borderRadius: '50%', background: waitingCount > 0 ? accent : '#555', flexShrink: 0 }} />
            <span style={{ fontFamily: 'var(--mono)', fontSize: '9px', color: 'var(--text-muted)' }}>{waitingCount} {t.pending}</span>
          </div>
          {isAdmin && selectedNextDate && (
            <button onClick={e => { e.stopPropagation(); handleSetManualDate(''); }} style={{ position: 'absolute', bottom: '10px', right: '12px', fontFamily: 'var(--mono)', fontSize: '8px', color: accent, background: 'none', border: `1px solid ${accent}44`, padding: '2px 8px', borderRadius: '3px', cursor: 'pointer', zIndex: 2 }}>
              {t.auto}
            </button>
          )}
        </div>
      );
    };

    /* ============================================ */
    /* SITE SETTINGS MODAL                            */
    /* ============================================ */
    /* 
      SiteSettingsModal: เปลี่ยนชื่อเว็บและ favicon
      Props:
        - onClose: ปิด modal
        - currentFavicon: favicon URL ปัจจุบัน
        - currentSiteTitle: ชื่อเว็บปัจจุบัน
        - onSaveFavicon: บันทึก favicon
        - onSaveSiteTitle: บันทึกชื่อเว็บ
        - accent: สีหลัก
    */
    const SiteSettingsModal = ({ onClose, currentFavicon, currentSiteTitle, onSaveFavicon, onSaveSiteTitle, accent }) => {
      const { t } = useLang();
      const [favUrl, setFavUrl] = useState(currentFavicon || '');
      const [title, setTitle] = useState(currentSiteTitle || '');
      const [msg, setMsg] = useState('');
      const save = async (fn, val) => { await fn(val); setMsg(t.saved); setTimeout(() => setMsg(''), 2000); };
      return (
        <Modal onClose={onClose}>
          <div style={{ padding: '24px', fontFamily: 'var(--mono)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
              <span style={{ fontSize: '11px', letterSpacing: '0.2em', color: accent, textTransform: 'uppercase' }}>{t.settingsTitle}</span>
              <button onClick={onClose} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', padding: '4px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '11px' }}>ESC</button>
            </div>
            {msg && <div style={{ background: `${accent}22`, border: `1px solid ${accent}44`, color: accent, padding: '8px 12px', borderRadius: '6px', fontSize: '10px', marginBottom: '16px' }}>{msg}</div>}
            <div style={{ marginBottom: '16px' }}>
              <label style={{ display: 'block', fontSize: '9px', letterSpacing: '0.15em', color: 'var(--text-muted)', marginBottom: '8px', textTransform: 'uppercase' }}>{t.siteTitle}</label>
              <div style={{ display: 'flex', gap: '8px' }}>
                <input value={title} onChange={e => setTitle(e.target.value)} style={{ flex: 1, background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--paper)', padding: '10px 12px', borderRadius: '6px', fontFamily: 'var(--mono)', fontSize: '12px', outline: 'none' }} placeholder="Mameji" />
                <button onClick={() => save(onSaveSiteTitle, title)} style={{ background: accent, color: 'var(--ink)', border: 'none', padding: '10px 16px', borderRadius: '6px', fontFamily: 'var(--mono)', fontSize: '10px', fontWeight: 700, cursor: 'pointer' }}>{t.save}</button>
              </div>
            </div>
            <div>
              <label style={{ display: 'block', fontSize: '9px', letterSpacing: '0.15em', color: 'var(--text-muted)', marginBottom: '8px', textTransform: 'uppercase' }}>{t.faviconUrl}</label>
              <div style={{ display: 'flex', gap: '8px' }}>
                <input value={favUrl} onChange={e => setFavUrl(e.target.value)} style={{ flex: 1, background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--paper)', padding: '10px 12px', borderRadius: '6px', fontFamily: 'var(--mono)', fontSize: '10px', outline: 'none' }} placeholder="https://..." />
                <button onClick={() => save(onSaveFavicon, favUrl)} style={{ background: 'var(--muted)', color: 'var(--paper)', border: '1px solid var(--border)', padding: '10px 16px', borderRadius: '6px', fontFamily: 'var(--mono)', fontSize: '10px', cursor: 'pointer' }}>{t.save}</button>
              </div>
            </div>
          </div>
        </Modal>
      );
    };

    /* ============================================ */
    /* AUTH MODAL                                    */
    /* ============================================ */
    /* 
      AuthModal: หน้าจอเข้าสู่ระบบสำหรับแอดมิน
      Props:
        - onClose: ปิด modal
        - onLogin: ฟังก์ชันเมื่อล็อกอินสำเร็จ
        - accent: สีหลัก
    */
    const AuthModal = ({ onClose, onLogin, accent }) => {
      const { t } = useLang();
      const [pw, setPw] = useState('');
      const [err, setErr] = useState(false);
      const [loading, setLoading] = useState(false);
      const handle = async e => {
        e.preventDefault(); setLoading(true); setErr(false);
        const res = await window.fetchAPI({ action: 'verifyAdminPassword', inputPassword: pw });
        setLoading(false);
        if (res.isValid) onLogin(); else setErr(true);
      };
      return (
        <Modal onClose={onClose}>
          <form onSubmit={handle} style={{ padding: '28px', fontFamily: 'var(--mono)' }}>
            <div style={{ marginBottom: '24px' }}>
              <div style={{ fontSize: '11px', letterSpacing: '0.2em', color: accent, marginBottom: '4px', textTransform: 'uppercase' }}>{t.adminAccess}</div>
              <div style={{ fontSize: '22px', fontFamily: 'var(--display)', fontWeight: 800, color: 'var(--paper)' }}>{t.authenticate}</div>
            </div>
            <input type="password" required value={pw} onChange={e => { setPw(e.target.value); setErr(false); }}
              style={{ width: '100%', background: 'var(--muted)', border: `1px solid ${err ? 'var(--accent2)' : 'var(--border)'}`, color: 'var(--paper)', padding: '14px 16px', borderRadius: '8px', fontFamily: 'var(--mono)', fontSize: '14px', letterSpacing: '0.3em', outline: 'none', textAlign: 'center', marginBottom: err ? '8px' : '16px', boxSizing: 'border-box', transition: 'border-color 0.2s' }}
              placeholder="••••••••" />
            {err && <div style={{ fontSize: '10px', color: 'var(--accent2)', marginBottom: '12px', letterSpacing: '0.1em' }}>{t.accessDenied}</div>}
            <button type="submit" disabled={loading}
              className="transition-all hover:opacity-90 active:scale-95"
              style={{ width: '100%', background: accent, color: 'var(--ink)', border: 'none', padding: '14px', borderRadius: '8px', fontFamily: 'var(--mono)', fontSize: '12px', fontWeight: 700, cursor: loading ? 'not-allowed' : 'pointer', letterSpacing: '0.2em', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
              {loading ? <><span className="spin-slow" style={{ display: 'flex' }}><Ico.Loader /></span> {t.verifying}</> : t.loginBtn}
            </button>
          </form>
        </Modal>
      );
    };

    /* ============================================ */
    /* TASK FORM MODAL                               */
    /* ============================================ */
    /* 
      TaskFormModal: ฟอร์มเพิ่ม/แก้ไขงาน
      Props:
        - editingTask: งานที่กำลังแก้ไข (null ถ้าเพิ่มใหม่)
        - taskTypes: รายการประเภทงาน
        - channels: รายการช่องทาง
        - nextQueueDate: วันที่คิวถัดไป (สำหรับ default deadline)
        - onClose: ปิด modal
        - onSave: บันทึกงาน
        - onDelete: ลบงาน
        - accent, accent2: สีหลัก
    */
    const TaskFormModal = ({ editingTask, taskTypes, channels, nextQueueDate, onClose, onSave, onDelete, accent, accent2 }) => {
      const { t } = useLang();
      const [saving, setSaving] = useState(false);
      const [delConfirm, setDelConfirm] = useState(false);
      const [copied, setCopied] = useState(false);
      const [isUrgent, setIsUrgent] = useState(editingTask?.priority === 'urgent' || false); // เพิ่ม state สำหรับ urgent

      const copy = (text) => { navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); };

      const handleSubmit = async (e) => {
        e.preventDefault(); setSaving(true);
        const f = new FormData(e.target);
        await onSave({
          id: editingTask?.id || null,
          title: '',
          client: f.get('client'),
          type: f.get('type'),
          channel: f.get('channel'),
          priority: isUrgent ? 'urgent' : 'normal',
          deadline: f.get('deadline'),
          details: f.get('details')
        });
        setSaving(false);
      };

      return (
        <Modal onClose={onClose}>
          <form onSubmit={handleSubmit} style={{ padding: '24px', fontFamily: 'var(--mono)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
              <span style={{ fontSize: '11px', letterSpacing: '0.2em', color: accent, textTransform: 'uppercase' }}>{editingTask ? t.editTask : t.newTask}</span>
              <button type="button" onClick={onClose} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', padding: '4px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '11px' }}>ESC</button>
            </div>
            {editingTask?.id && (
              <div style={{ background: 'var(--muted)', border: '1px solid var(--border)', borderRadius: '6px', padding: '10px 12px', marginBottom: '16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontSize: '8px', color: 'var(--text-muted)', letterSpacing: '0.15em', marginBottom: '2px' }}>{t.taskId}</div>
                  <div style={{ fontSize: '10px', color: 'var(--paper)' }}>{editingTask.id}</div>
                </div>
                <button type="button" onClick={() => copy(editingTask.id)} style={{ background: copied ? `${accent}22` : 'none', border: `1px solid ${copied ? accent : 'var(--border)'}`, color: copied ? accent : 'var(--text-muted)', padding: '4px 10px', borderRadius: '4px', cursor: 'pointer', fontSize: '9px', letterSpacing: '0.1em', display: 'flex', alignItems: 'center', gap: '4px', transition: 'all 0.2s' }}>
                  <Ico.Copy />{copied ? t.copied : t.copy}
                </button>
              </div>
            )}
            <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: '12px' }}>
              <label style={{
                display: 'flex',
                alignItems: 'center',
                gap: '8px',
                cursor: 'pointer',
                padding: '4px 8px',
                borderRadius: '4px',
                userSelect: 'none'
              }}>
                <span style={{
                  fontFamily: 'var(--mono)',
                  fontSize: '10px',
                  color: 'var(--text-muted)',
                  letterSpacing: '0.1em'
                }}>
                  {t.urgent}
                </span>
                <input
                  type="checkbox"
                  checked={isUrgent}
                  onChange={(e) => setIsUrgent(e.target.checked)}
                  style={{ display: 'none' }}
                />
                <div
                  style={{
                    width: '36px',
                    height: '18px',
                    background: isUrgent ? `${accent2}33` : 'var(--muted)',
                    borderRadius: '10px',
                    position: 'relative',
                    border: `1px solid ${isUrgent ? accent2 : 'var(--border)'}`,
                    transition: 'all 0.2s ease',
                    pointerEvents: 'none' // ป้องกันไม่ให้ div รับ events
                  }}
                >
                  <div style={{
                    position: 'absolute',
                    width: '14px',
                    height: '14px',
                    borderRadius: '50%',
                    background: isUrgent ? accent2 : 'var(--text-muted)',
                    top: '1px',
                    transition: 'left 0.2s ease',
                    left: isUrgent ? '20px' : '2px',
                    boxShadow: isUrgent ? `0 0 8px ${accent2}` : 'none'
                  }} />
                </div>
              </label>
            </div>
            {[
              { name: 'client', placeholder: t.clientPlaceholder, required: true, list: null, defaultVal: editingTask?.client },
              { name: 'type', placeholder: t.typePlaceholder, required: true, list: 'typeList', defaultVal: editingTask?.type },
              { name: 'channel', placeholder: t.channelPlaceholder, required: true, list: 'channelList', defaultVal: editingTask?.channel },
            ].map(f => (
              <div key={f.name} style={{ marginBottom: '10px' }}>
                <input name={f.name} required={f.required} defaultValue={f.defaultVal || ''} list={f.list || undefined}
                  style={{ width: '100%', background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--paper)', padding: '12px 14px', borderRadius: '6px', fontFamily: 'var(--mono)', fontSize: '11px', outline: 'none', boxSizing: 'border-box', transition: 'border-color 0.2s' }}
                  onFocus={e => e.target.style.borderColor = accent}
                  onBlur={e => e.target.style.borderColor = 'var(--border)'}
                  placeholder={f.placeholder} />
              </div>
            ))}
            <datalist id="typeList">{taskTypes.map(tp => <option key={tp} value={tp} />)}</datalist>
            <datalist id="channelList">{channels.map(ch => <option key={ch} value={ch} />)}</datalist>
            <textarea name="details" rows="2" defaultValue={editingTask?.details || ''}
              style={{ width: '100%', background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--paper)', padding: '12px 14px', borderRadius: '6px', fontFamily: 'var(--body)', fontSize: '12px', outline: 'none', resize: 'none', marginBottom: '10px', boxSizing: 'border-box', transition: 'border-color 0.2s' }}
              onFocus={e => e.target.style.borderColor = accent}
              onBlur={e => e.target.style.borderColor = 'var(--border)'}
              placeholder={t.detailsPlaceholder} />
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '20px', background: 'var(--muted)', border: '1px solid var(--border)', borderRadius: '6px', padding: '10px 14px' }}>
              <Ico.Cal /><span style={{ fontSize: '9px', color: 'var(--text-muted)', letterSpacing: '0.15em', flex: 1, textTransform: 'uppercase' }}>{t.deadline}</span>
              <input type="date" name="deadline" required defaultValue={editingTask?.deadline || nextQueueDate}
                style={{ background: 'none', border: 'none', color: accent, fontFamily: 'var(--mono)', fontSize: '11px', outline: 'none', cursor: 'pointer' }} />
            </div>
            {saving ? (
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', padding: '14px', color: 'var(--text-muted)', fontFamily: 'var(--mono)', fontSize: '11px' }}>
                <span className="spin-slow" style={{ display: 'flex' }}><Ico.Loader /></span> {t.saving}
              </div>
            ) : (
              <div style={{ display: 'flex', gap: '8px' }}>
                <button type="submit" className="transition-all hover:opacity-90 active:scale-95"
                  style={{ flex: 1, background: accent, color: 'var(--ink)', border: 'none', padding: '14px', borderRadius: '8px', fontFamily: 'var(--mono)', fontSize: '11px', fontWeight: 700, cursor: 'pointer', letterSpacing: '0.15em' }}>
                  {editingTask ? t.update : t.create}
                </button>
                {editingTask && (
                  <button type="button" onClick={() => setDelConfirm(true)} className="transition-all hover:text-red-400 active:scale-95"
                    style={{ width: '46px', background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--text-muted)', borderRadius: '8px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Ico.Trash />
                  </button>
                )}
              </div>
            )}
            {delConfirm && (
              <div style={{ marginTop: '12px', background: '#ff475722', border: '1px solid #ff475766', borderRadius: '8px', padding: '12px', textAlign: 'center' }}>
                <div style={{ fontSize: '10px', color: '#ff4757', letterSpacing: '0.1em', marginBottom: '10px' }}>{t.confirmDelete}</div>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <button type="button" onClick={() => setDelConfirm(false)} style={{ flex: 1, background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--text-muted)', padding: '8px', borderRadius: '6px', cursor: 'pointer', fontFamily: 'var(--mono)', fontSize: '10px' }}>{t.cancel}</button>
                  <button type="button" onClick={() => onDelete(editingTask.id)} style={{ flex: 1, background: '#ff4757', color: 'white', border: 'none', padding: '8px', borderRadius: '6px', cursor: 'pointer', fontFamily: 'var(--mono)', fontSize: '10px', fontWeight: 700 }}>{t.delete}</button>
                </div>
              </div>
            )}
          </form>
        </Modal>
      );
    };

    /* ============================================ */
    /* IMAGE MODAL                                   */
    /* ============================================ */
    /* 
      ImageModal: อัปโหลดรูปภาพ (รองรับ Google Drive ID)
      Props:
        - onClose: ปิด modal
        - onSave: บันทึก URL รูปภาพ
        - titleKey: คีย์ภาษา (updateProfile/updateBanner)
        - accent: สีหลัก
    */
    const ImageModal = ({ onClose, onSave, titleKey, accent }) => {
      const { t } = useLang();
      const [url, setUrl] = useState('');
      const handle = e => {
        e.preventDefault(); if (!url) return;
        let final = url;
        const m = final.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || final.match(/id=([a-zA-Z0-9_-]+)/) || final.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (m && m[1]) final = `https://drive.google.com/uc?export=view&id=${m[1]}`;
        onSave(final);
      };
      return (
        <Modal onClose={onClose}>
          <form onSubmit={handle} style={{ padding: '24px', fontFamily: 'var(--mono)' }}>
            <div style={{ fontSize: '11px', letterSpacing: '0.2em', color: accent, marginBottom: '20px', textTransform: 'uppercase' }}>{t[titleKey]}</div>
            <input type="url" required value={url} onChange={e => setUrl(e.target.value)}
              style={{ width: '100%', background: 'var(--muted)', border: '1px solid var(--border)', color: 'var(--paper)', padding: '12px 14px', borderRadius: '6px', fontFamily: 'var(--mono)', fontSize: '11px', outline: 'none', marginBottom: '12px', boxSizing: 'border-box' }}
              placeholder="https://..." />
            <button type="submit" className="transition-all hover:opacity-90 active:scale-95"
              style={{ width: '100%', background: accent, color: 'var(--ink)', border: 'none', padding: '13px', borderRadius: '8px', fontFamily: 'var(--mono)', fontSize: '11px', fontWeight: 700, cursor: 'pointer', letterSpacing: '0.15em' }}>{t.uploadBtn}</button>
          </form>
        </Modal>
      );
    };

    /* ============================================ */
    /* MAIN APP COMPONENT                            */
    /* ============================================ */
    function App() {
      /* ========================================== */
      /* STATE DECLARATIONS                         */
      /* ========================================== */
      const [tasks, setTasks] = useState([]);                 // รายการงานทั้งหมด
      const [taskTypes, setTaskTypes] = useState(['Logo', 'Banner', 'Artwork']); // ประเภทงาน (auto-complete)
      const [channels, setChannels] = useState(['LINE', 'FB', 'IG']);            // ช่องทาง (auto-complete)
      const [isLoading, setIsLoading] = useState(true);      // สถานะโหลดข้อมูล
      const [view, setView] = useState('dashboard');          // มุมมองหลัก (dashboard/all)
      const [isCalendarView, setIsCalendarView] = useState(false); // แสดงปฏิทินหรือไม่
      const [currentMonth, setCurrentMonth] = useState(new Date()); // เดือนปัจจุบันในปฏิทิน
      const [selectedDate, setSelectedDate] = useState(() => {      // วันที่เลือกในปฏิทิน (default วันนี้)
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      });
      const [showModal, setShowModal] = useState(false);      // แสดง modal ฟอร์มงาน
      const [editingTask, setEditingTask] = useState(null);   // งานที่กำลังแก้ไข
      const [showAuth, setShowAuth] = useState(false);        // แสดง modal เข้าสู่ระบบ
      const [showSettings, setShowSettings] = useState(false); // แสดง modal ตั้งค่าเว็บ
      const [showTheme, setShowTheme] = useState(false);      // แสดง modal ธีม
      const [showProfileImg, setShowProfileImg] = useState(false); // แสดง modal อัปโหลดรูปโปรไฟล์
      const [showBannerImg, setShowBannerImg] = useState(false);   // แสดง modal อัปโหลดแบนเนอร์
      const [isAdmin, setIsAdmin] = useState(false);          // สถานะแอดมิน
      const [profileImage, setProfileImage] = useState(null); // URL รูปโปรไฟล์
      const [bannerImage, setBannerImage] = useState(null);   // URL รูปแบนเนอร์
      const [isBannerVisible, setIsBannerVisible] = useState(true); // แสดงแบนเนอร์หรือไม่
      const [siteTitle, setSiteTitle] = useState('Mameji');     // ชื่อเว็บไซต์
      const [favicon, setFavicon] = useState('');             // favicon URL
      const [selectedNextDate, setSelectedNextDate] = useState(''); // วันที่คิวถัดไปที่แอดมินเลือก
      const [searchQuery, setSearchQuery] = useState('');     // คำค้นหา
      const [filterType, setFilterType] = useState('all');    // ตัวกรอง (all/pending/done/month)
      const [uiTheme, setUITheme] = useState('dark');         // ธีมปัจจุบัน
      const [currentFont, setCurrentFont] = useState('default'); // ฟอนต์ปัจจุบัน
      const [lang, setLang] = useState(() => localStorage.getItem('appLang') || 'th'); // ภาษา

      /* ✨ NEW: Toast state */
      const [toasts, setToasts] = useState([]);               // รายการ toast ที่แสดง
      const toastCounter = useRef(0);                          // ตัวนับ ID สำหรับ toast

      /* ========================================== */
      /* LANGUAGE & THEME HELPERS                    */
      /* ========================================== */
      const t = TRANSLATIONS[lang] || TRANSLATIONS.th;        // ข้อความตามภาษาที่เลือก

      /* แสดง toast */
      const showToast = useCallback((msg, type = 'success') => {
        const id = ++toastCounter.current;
        const currentThemeData = UI_THEMES.find(th => th.id === uiTheme) || UI_THEMES[0];
        setToasts(prev => [...prev, { id, msg, type, accent: currentThemeData.accent }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 2800);
      }, [uiTheme]);

      const fetchAPI = window.fetchAPI;                        // API helper

      const currentTheme = UI_THEMES.find(th => th.id === uiTheme) || UI_THEMES[0]; // ข้อมูลธีมปัจจุบัน
      const accent = currentTheme.accent;                      // สีหลัก
      const accent2 = currentTheme.accent2;                    // สีรอง
      const uiClass = currentTheme.class || '';                // class เพิ่มเติม

      /* อัปเดต favicon */
      const updateFavicon = useCallback(url => {
        ['apple-touch-icon', 'icon-192', 'shortcut-icon'].forEach(id => { const el = document.getElementById(id); if (el) el.href = url; });
      }, []);

      /* ========================================== */
      /* INITIALIZATION (useEffect)                  */
      /* ========================================== */
      /* โหลดค่าที่บันทึกไว้จาก localStorage */
      useEffect(() => {
        const savedTheme = localStorage.getItem('uiTheme');
        if (savedTheme) setUITheme(savedTheme);
        const savedFont = localStorage.getItem('appFont');
        if (savedFont) { setCurrentFont(savedFont); setActiveFont(savedFont); }
        const savedLang = localStorage.getItem('appLang');
        if (savedLang && TRANSLATIONS[savedLang]) setLang(savedLang);
      }, []);

      /* โหลดข้อมูลเริ่มต้นจาก Google Apps Script */
      useEffect(() => {
        fetch(window.APP_CONFIG.WEB_APP_URL + "?action=getInitialData", { redirect: "follow" })
          .then(r => r.json())
          .then(res => {
            if (res.status === 'success') {
              const d = res.data;
              setTasks(d.tasks || []);
              if (d.taskTypes?.length > 0) setTaskTypes(d.taskTypes);
              if (d.channels?.length > 0) setChannels(d.channels);
              if (d.profileImage) setProfileImage(d.profileImage);
              if (d.bannerImage) setBannerImage(d.bannerImage);
              if (d.bannerVisible !== undefined) setIsBannerVisible(d.bannerVisible);
              if (d.lockedNextDate) setSelectedNextDate(d.lockedNextDate);
              if (d.siteTitle) { setSiteTitle(d.siteTitle); document.title = d.siteTitle; }
              if (d.favicon) { setFavicon(d.favicon); updateFavicon(d.favicon); }

              // โหลดธีมที่บันทึกไว้
              if (d.theme) {
                setUITheme(d.theme);
                localStorage.setItem('uiTheme', d.theme);
                const theme = UI_THEMES.find(th => th.id === d.theme);
                if (theme) {
                  document.documentElement.style.setProperty('--bg-from', theme.bgFrom);
                  document.documentElement.style.setProperty('--bg-to', theme.bgTo);
                  document.documentElement.style.setProperty('--accent', theme.accent);
                  document.documentElement.style.setProperty('--accent2', theme.accent2);
                }
              }
            }
            setIsLoading(false);
          })
          .catch(() => setIsLoading(false));
      }, []);

      /* อัปเดต CSS variables เมื่อเปลี่ยนธีม */
      useEffect(() => {
        if (currentTheme) {
          document.documentElement.style.setProperty('--bg-from', currentTheme.bgFrom);
          document.documentElement.style.setProperty('--bg-to', currentTheme.bgTo);
          document.documentElement.style.setProperty('--accent', currentTheme.accent);
          document.documentElement.style.setProperty('--accent2', currentTheme.accent2);
        }
      }, [currentTheme]);

      /* ========================================== */
      /* COMPUTED VALUES (useMemo)                   */
      /* ========================================== */
      const today = useMemo(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }, []);

      const todayTasks = useMemo(() => tasks.filter(tk => tk.deadline === today), [tasks, today]);
      const doneToday = useMemo(() => todayTasks.filter(tk => tk.status === 'done').length, [todayTasks]);
      const progress = todayTasks.length === 0 ? 0 : Math.round((doneToday / todayTasks.length) * 100);
      const waitingCount = useMemo(() => tasks.filter(tk => tk.status !== 'done').length, [tasks]);

      /* คำนวณวันคิวถัดไป (วันที่ว่าง) */
      const nextQueueDate = useMemo(() => {
        if (selectedNextDate) return selectedNextDate;
        let d = new Date();
        for (let i = 0; i < 365; i++) {
          const s = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
          if (tasks.filter(tk => tk.deadline === s).length === 0) return s;
          d.setDate(d.getDate() + 1);
        }
        return today;
      }, [tasks, selectedNextDate, today]);

      /* ========================================== */
      /* CALLBACK FUNCTIONS                          */
      /* ========================================== */
      /* เปลี่ยนสถานะงาน (done/todo) */
      const toggleStatus = useCallback((e, id) => {
        e.stopPropagation();
        setTasks(prev => prev.map(tk => {
          if (tk.id === id) { const s = tk.status === 'done' ? 'todo' : 'done'; fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus: s }); return { ...tk, status: s }; }
          return tk;
        }));
      }, []);

      /* เปลี่ยนสถานะงาน (doing/todo) */
      const toggleDoing = useCallback((e, id) => {
        e.stopPropagation();
        setTasks(prev => prev.map(tk => {
          if (tk.id === id) { const s = tk.status === 'doing' ? 'todo' : 'doing'; fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus: s }); return { ...tk, status: s }; }
          return tk;
        }));
      }, []);

      /* กำหนดวันที่คิวถัดไปด้วยตนเอง */
      const handleSetManualDate = useCallback(v => {
        setSelectedNextDate(v);
        fetchAPI({ action: 'saveLockedNextDate', dateStr: v });
      }, []);

      /* บันทึก favicon */
      const handleSaveFavicon = useCallback(async url => {
        setFavicon(url); updateFavicon(url);
        await fetchAPI({ action: 'saveFavicon', faviconUrl: url });
        showToast(t.toastSaved);
      }, [updateFavicon, showToast, t]);

      /* บันทึกชื่อเว็บ */
      const handleSaveSiteTitle = useCallback(async title => {
        setSiteTitle(title); document.title = title;
        await fetchAPI({ action: 'saveSiteTitle', title });
        showToast(t.toastSaved);
      }, [showToast, t]);

      /* บันทึกงาน (เพิ่ม/แก้ไข) */
      const handleSaveTask = async (taskData) => {
        const isEdit = !!editingTask;
        const res = await fetchAPI({ action: 'saveOrUpdateTask', task: taskData });
        if (res.status === 'success') {
          setTasks(prev => isEdit ? prev.map(tk => tk.id === res.task.id ? res.task : tk) : [...prev, res.task]);
          showToast(isEdit ? t.toastUpdated : t.toastCreated); // ✨ Toast!
        }
        setShowModal(false); setEditingTask(null);
      };

      /* ลบงาน */
      const handleDeleteTask = async (id) => {
        await fetchAPI({ action: 'deleteTask', taskId: id });
        setTasks(prev => prev.filter(tk => tk.id !== id));
        showToast(t.toastDeleted, 'error'); // ✨ Toast!
        setShowModal(false); setEditingTask(null);
      };

      /* เปลี่ยนธีม UI และบันทึกลง Google Sheets */
      const handleUIThemeChange = async (id) => {
        setUITheme(id);
        localStorage.setItem('uiTheme', id);

        // บันทึกลง Google Sheets
        try {
          await fetchAPI({
            action: 'saveTheme',
            theme: id
          });
          showToast('บันทึกธีมเรียบร้อย ✓');
        } catch (error) {
          console.error('Failed to save theme:', error);
          showToast('ไม่สามารถบันทึกธีมได้', 'error');
        }

        const theme = UI_THEMES.find(th => th.id === id);
        if (theme) {
          document.documentElement.style.setProperty('--bg-from', theme.bgFrom);
          document.documentElement.style.setProperty('--bg-to', theme.bgTo);
          document.documentElement.style.setProperty('--accent', theme.accent);
          document.documentElement.style.setProperty('--accent2', theme.accent2);
        }
      };

      /* เปลี่ยนฟอนต์ */
      const handleFontChange = (fontId) => {
        setCurrentFont(fontId); localStorage.setItem('appFont', fontId); setActiveFont(fontId);
      };

      /* กรองงานตามคำค้นหาและตัวกรอง */
      const filteredTasks = useMemo(() => tasks.filter(task => {
        const q = searchQuery.toLowerCase();
        const matchSearch = !q || task.client.toLowerCase().includes(q) || task.type.toLowerCase().includes(q) || (task.id && task.id.toLowerCase().includes(q));
        const now = new Date();
        const thisYearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const matchFilter = filterType === 'all' || (filterType === 'pending' && task.status !== 'done') || (filterType === 'done' && task.status === 'done') || (filterType === 'month' && task.deadline && task.deadline.startsWith(thisYearMonth));
        return matchSearch && matchFilter;
      }), [tasks, searchQuery, filterType]);

      const displayedTasks = (isCalendarView && filterType !== 'month') ? filteredTasks.filter(task => task.deadline === selectedDate) : filteredTasks;

      /* ========================================== */
      /* LOADING SCREEN                             */
      /* ========================================== */
      if (isLoading) return (
        <LangContext.Provider value={{ lang, t, setLang }}>
          <div className={`${uiClass}`} style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: `linear-gradient(135deg, ${currentTheme.bgFrom}, ${currentTheme.bgTo})`, fontFamily: 'var(--mono)' }}>
            <div style={{ fontSize: '10px', letterSpacing: '0.4em', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '16px' }}>{t.loading}</div>
            <div style={{ display: 'flex', gap: '6px' }}>
              {[0, 1, 2].map(i => <div key={i} style={{ width: '4px', height: '4px', borderRadius: '50%', background: accent, animation: `blink 1s step-end infinite ${i * 0.2}s` }} />)}
            </div>
          </div>
        </LangContext.Provider>
      );

      /* ========================================== */
      /* MAIN RENDER                                */
      /* ========================================== */
      return (
        <LangContext.Provider value={{ lang, t, setLang }}>
          <div className={`${uiClass}`} style={{ minHeight: '100vh', background: `linear-gradient(135deg, var(--bg-from), var(--bg-to))`, fontFamily: 'var(--body)', transition: 'background 0.3s ease', position: 'relative' }}>

            {/* ✨ PARTICLE CANVAS (เอฟเฟกต์พื้นหลัง) */}
            <ParticleCanvas accent={accent} />

            {/* เส้นสแกนแนวตั้ง */}
            <div className="scan-line" />

            {/* ✨ TOAST NOTIFICATIONS */}
            <Toast toasts={toasts} />

            {/* container หลัก - จำกัดความกว้าง 480px (mobile-first) */}
            <div style={{ maxWidth: '480px', margin: '0 auto', minHeight: '100vh', paddingBottom: '90px', position: 'relative', zIndex: 1 }}>

              {/* ======================================== */}
              {/* HEADER SECTION                           */}
              {/* ======================================== */}
              <div style={{ padding: '20px 20px 0', position: 'relative', zIndex: 10 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '6px' }}>
                  <div>
                    <div style={{ fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.3em', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '2px' }}>
                      Mameji/{isAdmin ? t.nexoAdmin : t.nexoUser}<span className="blink" style={{ color: accent }}>_</span>
                    </div>
                    {/* ✨ GLITCH TITLE */}
                    <div
                      className="glitch"
                      data-text={siteTitle}
                      style={{
                        fontFamily: 'var(--display)',
                        fontSize: '34px',
                        fontWeight: 800,
                        color: accent,
                        letterSpacing: '-1px',
                        lineHeight: 1,
                        textShadow: `0 0 20px ${accent}44`,
                      }}>
                      {siteTitle}
                    </div>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '8px' }}>
                    <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                      {isAdmin && (
                        <>
                          <button onClick={() => setShowTheme(true)} className="transition-all hover:scale-110 active:scale-90"
                            style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', width: '30px', height: '30px', borderRadius: '6px', cursor: 'pointer', fontSize: '13px', display: 'flex', alignItems: 'center', justifyContent: 'center' }} title={t.themeTitle}>🎨</button>
                          <button onClick={() => setShowSettings(true)} className="transition-all hover:scale-110 active:scale-90"
                            style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text-muted)', width: '30px', height: '30px', borderRadius: '6px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Ico.Settings /></button>
                        </>
                      )}
                      <button onClick={() => isAdmin ? setIsAdmin(false) : setShowAuth(true)}
                        className="transition-all hover:scale-105 active:scale-95"
                        style={{ fontFamily: 'var(--mono)', fontSize: '8px', letterSpacing: '0.15em', background: isAdmin ? accent : 'var(--dim)', color: isAdmin ? 'var(--ink)' : 'var(--text-muted)', border: `1px solid ${isAdmin ? accent : 'var(--border)'}`, padding: '6px 10px', borderRadius: '4px', cursor: 'pointer', textTransform: 'uppercase' }}>
                        {isAdmin ? t.logout : t.login}
                      </button>
                    </div>
                    {/* รูปโปรไฟล์ - คลิกเปลี่ยนได้เฉพาะแอดมิน */}
                    <div onClick={() => isAdmin && setShowProfileImg(true)}
                      className={isAdmin ? 'transition-all hover:scale-110 active:scale-90' : ''}
                      style={{ width: '44px', height: '44px', borderRadius: '8px', border: `2px solid ${isAdmin ? `${accent}44` : 'var(--border)'}`, overflow: 'hidden', cursor: isAdmin ? 'pointer' : 'default', flexShrink: 0, background: 'var(--dim)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      {profileImage ? <img src={profileImage} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} /> : <span style={{ fontSize: '20px' }}>🖤</span>}
                    </div>
                  </div>
                </div>

                {/* Ticker (ข้อความวิ่ง) */}
                <div className="ticker-wrap" style={{ borderTop: `1px solid var(--border)`, borderBottom: `1px solid var(--border)`, padding: '6px 0', overflow: 'hidden' }}>
                  <div className="ticker-inner">
                    {[...t.tickerItems, ...t.tickerItems].map((item, i) => (
                      <span key={i} style={{ fontFamily: 'var(--mono)', fontSize: '8px', letterSpacing: '0.3em', color: 'var(--text-muted)', textTransform: 'uppercase', marginRight: '40px' }}>
                        <span style={{ color: accent }}>◆</span> {item}{' '}
                      </span>
                    ))}
                  </div>
                </div>
              </div>

              {/* ======================================== */}
              {/* BANNER SECTION                           */}
              {/* ======================================== */}
              {bannerImage && isBannerVisible && (
                <div style={{ margin: '16px 20px 0', position: 'relative', borderRadius: '10px', overflow: 'hidden', height: '110px' }}>
                  <img src={bannerImage} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                  <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(0,0,0,0.6), transparent)' }} />
                  {isAdmin && (
                    <div style={{ position: 'absolute', bottom: '8px', right: '8px', display: 'flex', gap: '6px' }}>
                      <button onClick={() => setShowBannerImg(true)} className="transition-all hover:scale-110" style={{ background: 'rgba(0,0,0,0.7)', border: '1px solid rgba(255,255,255,0.2)', color: 'white', width: '28px', height: '28px', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Ico.Image /></button>
                      <button onClick={() => { setIsBannerVisible(false); fetchAPI({ action: 'saveBannerVisibility', isVisible: false }); }} className="transition-all hover:scale-110" style={{ background: 'rgba(0,0,0,0.7)', border: '1px solid rgba(255,255,255,0.2)', color: 'white', width: '28px', height: '28px', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Ico.EyeOff /></button>
                    </div>
                  )}
                </div>
              )}
              {!bannerImage && isAdmin && (
                <div onClick={() => setShowBannerImg(true)} className="transition-all hover:opacity-80"
                  style={{ margin: '16px 20px 0', height: '52px', border: `1px dashed var(--border)`, borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: 'var(--text-muted)', fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.2em' }}>
                  {t.addBanner}
                </div>
              )}
              {bannerImage && !isBannerVisible && isAdmin && (
                <div style={{ margin: '16px 20px 0', display: 'flex', justifyContent: 'flex-end' }}>
                  <button onClick={() => { setIsBannerVisible(true); fetchAPI({ action: 'saveBannerVisibility', isVisible: true }); }} style={{ fontFamily: 'var(--mono)', fontSize: '9px', color: 'var(--text-muted)', background: 'none', border: '1px solid var(--border)', padding: '4px 12px', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '6px' }}><Ico.Eye /> {t.showBanner}</button>
                </div>
              )}

              {/* ======================================== */}
              {/* MAIN CONTENT (DASHBOARD / ALL TASKS)    */}
              {/* ======================================== */}
              <div style={{ padding: '20px' }}>
                {view === 'dashboard' ? (
                  /* ---------- DASHBOARD VIEW (คิววันนี้) ---------- */
                  <div className="animate-fadeIn">
                    <div style={{ display: 'flex', gap: '10px', marginBottom: '20px' }}>
                      <ProgressWidget progress={progress} doneToday={doneToday} todayLen={todayTasks.length} accent={accent} />
                      <QueueWidget isAdmin={isAdmin} nextQueueDate={nextQueueDate} selectedNextDate={selectedNextDate} handleSetManualDate={handleSetManualDate} waitingCount={waitingCount} accent={accent} />
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '12px' }}>
                      <span style={{ fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.3em', color: 'var(--text-muted)', textTransform: 'uppercase' }}>{t.todayQueue}</span>
                      <div style={{ flex: 1, height: '1px', background: 'var(--border)' }} />
                      <span style={{ fontFamily: 'var(--mono)', fontSize: '9px', color: accent }}>{todayTasks.length}</span>
                    </div>
                    {todayTasks.length > 0 ? todayTasks.map(tk => (
                      <TaskCard key={tk.id} task={tk} isAdmin={isAdmin} onEdit={task => { setEditingTask(task); setShowModal(true); }} onToggleDoing={toggleDoing} onToggleStatus={toggleStatus} accent={accent} accent2={accent2} />
                    )) : (
                      <div style={{ textAlign: 'center', padding: '40px 0', border: '1px dashed var(--border)', borderRadius: '8px' }}>
                        <div style={{ fontFamily: 'var(--mono)', fontSize: '10px', letterSpacing: '0.3em', color: 'var(--text-muted)' }}>{t.noTasksToday}</div>
                      </div>
                    )}
                  </div>
                ) : (
                  /* ---------- ALL TASKS VIEW (พร้อมค้นหา/กรอง) ---------- */
                  <div className="animate-fadeIn">
                    {/* ช่องค้นหา */}
                    <div style={{ position: 'relative', marginBottom: '12px' }}>
                      <div style={{ position: 'absolute', left: '14px', top: '50%', transform: 'translateY(-50%)', color: 'var(--text-muted)' }}><Ico.Search /></div>
                      <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                        style={{ width: '100%', background: 'var(--dim)', border: '1px solid var(--border)', color: 'var(--paper)', padding: '12px 12px 12px 40px', borderRadius: '8px', fontFamily: 'var(--mono)', fontSize: '11px', outline: 'none', boxSizing: 'border-box', transition: 'border-color 0.2s' }}
                        onFocus={e => e.target.style.borderColor = accent}
                        onBlur={e => e.target.style.borderColor = 'var(--border)'}
                        placeholder={t.searchPlaceholder} />
                    </div>

                    {/* ตัวกรอง */}
                    <div style={{ display: 'flex', gap: '6px', marginBottom: '12px', flexWrap: 'wrap' }}>
                      {[['all', t.filterAll], ['pending', t.filterPending], ['done', t.filterDone], ['month', t.filterMonth]].map(([v, label]) => (
                        <button key={v} onClick={() => { setFilterType(v); if (v === 'month') setIsCalendarView(false); }}
                          className="transition-all hover:opacity-90 active:scale-95"
                          style={{ flex: 1, minWidth: 0, padding: '8px 4px', fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.05em', border: '1px solid', borderColor: filterType === v ? accent : 'var(--border)', background: filterType === v ? `${accent}22` : 'transparent', color: filterType === v ? accent : 'var(--text-muted)', borderRadius: '4px', cursor: 'pointer', whiteSpace: 'nowrap' }}>
                          {label}
                        </button>
                      ))}
                      <button onClick={() => { setIsCalendarView(!isCalendarView); if (!isCalendarView) setFilterType('all'); }}
                        className="transition-all hover:opacity-90 active:scale-95"
                        style={{ padding: '8px 12px', fontFamily: 'var(--mono)', fontSize: '9px', border: '1px solid', borderColor: isCalendarView ? accent : 'var(--border)', background: isCalendarView ? `${accent}22` : 'transparent', color: isCalendarView ? accent : 'var(--text-muted)', borderRadius: '4px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0 }}>
                        <Ico.Cal />{t.filterCal}
                      </button>
                    </div>

                    {/* ปฏิทิน (ถ้าเปิด) */}
                    {isCalendarView && <CalendarView currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} selectedDate={selectedDate} setSelectedDate={setSelectedDate} today={today} tasks={tasks} accent={accent} />}

                    {/* จำนวนผลลัพธ์ */}
                    <div style={{ fontFamily: 'var(--mono)', fontSize: '9px', color: 'var(--text-muted)', letterSpacing: '0.15em', marginBottom: '10px' }}>
                      {displayedTasks.length} {t.results}
                    </div>

                    {/* รายการงาน */}
                    {displayedTasks.length > 0 ? displayedTasks.map(tk => (
                      <TaskCard key={tk.id} task={tk} isAdmin={isAdmin} onEdit={task => { setEditingTask(task); setShowModal(true); }} onToggleDoing={toggleDoing} onToggleStatus={toggleStatus} accent={accent} accent2={accent2} />
                    )) : (
                      <div style={{ textAlign: 'center', padding: '40px 0', border: '1px dashed var(--border)', borderRadius: '8px' }}>
                        <div style={{ fontFamily: 'var(--mono)', fontSize: '10px', letterSpacing: '0.3em', color: 'var(--text-muted)' }}>{t.noRecords}</div>
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* ======================================== */}
              {/* BOTTOM NAVIGATION (fixed)                */}
              {/* ======================================== */}
              <div style={{ position: 'fixed', bottom: '20px', left: '50%', transform: 'translateX(-50%)', zIndex: 50 }}>
                <div style={{ background: 'var(--dim)', border: '1px solid var(--border)', borderRadius: '50px', padding: '8px 12px', display: 'flex', alignItems: 'center', gap: '4px', boxShadow: `0 20px 40px -10px rgba(0,0,0,0.5), 0 0 30px ${accent}11` }}>
                  <button onClick={() => setView('dashboard')}
                    className="transition-all duration-150 hover:scale-110 active:scale-90"
                    style={{ width: '40px', height: '40px', borderRadius: '40px', border: 'none', background: view === 'dashboard' ? `${accent}22` : 'transparent', color: view === 'dashboard' ? accent : 'var(--text-muted)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Ico.Home />
                  </button>
                  {isAdmin && (
                    <button onClick={() => { setEditingTask(null); setShowModal(true); }}
                      className="nav-add-btn transition-all hover:scale-110 active:scale-90"
                      style={{ width: '48px', height: '48px', borderRadius: '50%', border: 'none', background: accent, color: 'var(--ink)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700 }}>
                      <Ico.Plus />
                    </button>
                  )}
                  <button onClick={() => setView('all')}
                    className="transition-all duration-150 hover:scale-110 active:scale-90"
                    style={{ width: '40px', height: '40px', borderRadius: '40px', border: 'none', background: view === 'all' ? `${accent}22` : 'transparent', color: view === 'all' ? accent : 'var(--text-muted)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Ico.List />
                  </button>
                </div>
              </div>

            </div>

            {/* ======================================== */}
            {/* MODALS                                   */}
            {/* ======================================== */}
            {showModal && <TaskFormModal editingTask={editingTask} taskTypes={taskTypes} channels={channels} nextQueueDate={nextQueueDate} onClose={() => { setShowModal(false); setEditingTask(null); }} onSave={handleSaveTask} onDelete={handleDeleteTask} accent={accent} accent2={accent2} />}
            {showAuth && <AuthModal onClose={() => setShowAuth(false)} onLogin={() => { setIsAdmin(true); setShowAuth(false); }} accent={accent} />}
            {showSettings && <SiteSettingsModal onClose={() => setShowSettings(false)} currentFavicon={favicon} currentSiteTitle={siteTitle} onSaveFavicon={handleSaveFavicon} onSaveSiteTitle={handleSaveSiteTitle} accent={accent} />}
            {showTheme && <ThemeManager onClose={() => setShowTheme(false)} uiTheme={uiTheme} onUIThemeChange={handleUIThemeChange} currentFont={currentFont} onFontChange={handleFontChange} />}
            {showProfileImg && <ImageModal onClose={() => setShowProfileImg(false)} titleKey="updateProfile" accent={accent} onSave={url => { setProfileImage(url); fetchAPI({ action: 'saveProfileImage', imageUrl: url }); setShowProfileImg(false); }} />}
            {showBannerImg && <ImageModal onClose={() => setShowBannerImg(false)} titleKey="updateBanner" accent={accent} onSave={url => { setBannerImage(url); setIsBannerVisible(true); fetchAPI({ action: 'saveBannerImage', imageUrl: url }); fetchAPI({ action: 'saveBannerVisibility', isVisible: true }); setShowBannerImg(false); }} />}
          </div>
        </LangContext.Provider>
      );
    }

    /* ============================================ */
    /* RENDER APP                                    */
    /* ============================================ */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script src="obfuscateds1.js"></script>
</body>

</html>
